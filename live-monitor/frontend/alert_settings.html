<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>告警设置 - Live Monitor</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/vendor/lucide/lucide.min.js"></script>
</head>
<body data-page="alert-settings">
  <header class="topbar">
    <a class="brand" href="/dashboard">
      <span class="brand-mark">LM</span>
      <span>Live Monitor</span>
    </a>
    <nav class="nav">
      <a href="/dashboard">监控首页</a>
      <!-- <a href="/services/new">添加服务</a> -->
      <a class="active" href="/alerts/settings">告警设置</a>
    </nav>
  </header>

  <main class="page">
    <section class="alert-center">
      <aside class="panel group-panel">
        <div class="panel-head">
          <h2>告警组</h2>
          <button class="icon-button" id="newAlertGroupBtn" title="新建告警组">
            <i data-lucide="plus"></i>
          </button>
        </div>
        <div id="alertGroupList" class="group-list">
          <p class="empty">加载中...</p>
        </div>
      </aside>

      <div class="panel panel-main alert-group-detail-panel">
        <div class="panel-head">
          <div>
            <h1>告警中心</h1>
            <p class="panel-subtitle">服务绑定告警组，告警组组合策略、渠道和接收人</p>
          </div>
          <button class="icon-button" id="reloadAlertSettingsBtn" title="刷新">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>

        <form id="alertGroupForm" class="form-grid alert-group-form">
          <label class="span-2">
            <span>组名</span>
            <input id="alertGroupNameInput" name="group_name" required maxlength="120" placeholder="例如：生产环境告警组">
          </label>

          <label class="span-2">
            <span>描述</span>
            <textarea id="alertGroupDescriptionInput" name="description" rows="3" placeholder="例如：生产核心链路，通知值班同学"></textarea>
          </label>

          <label class="switch-row span-2">
            <input id="alertGroupEnabledInput" name="enabled" type="checkbox" checked>
            <span>启用该告警组</span>
          </label>

          <section class="setting-section span-2">
            <div class="section-head">
              <h2>告警策略</h2>
            </div>
            <div id="policyChecklist" class="choice-list">
              <p class="empty">加载中...</p>
            </div>
          </section>

          <section class="setting-section span-2">
            <div class="section-head">
              <h2>通知渠道</h2>
            </div>
            <div id="channelChecklist" class="choice-list">
              <p class="empty">加载中...</p>
            </div>
          </section>

          <section class="setting-section span-2">
            <div class="section-head">
              <h2>接收人</h2>
            </div>
            <div id="recipientSummary" class="recipient-summary">
              <p class="empty">选择通知渠道后显示接收人</p>
            </div>
          </section>

          <div class="form-actions span-2">
            <a class="ghost-button" href="/dashboard">返回</a>
            <button class="ghost-button" id="deleteAlertGroupBtn" type="button">
              <i data-lucide="trash-2"></i>
              删除
            </button>
            <button class="primary-button" type="submit">
              <i data-lucide="save"></i>
              保存告警组
            </button>
          </div>
        </form>

        <div class="panel-head panel-head-inner">
          <div>
            <h2>渠道库</h2>
            <p class="panel-subtitle">渠道独立维护，告警组按需勾选复用</p>
          </div>
          <button class="icon-button" id="newAlertChannelBtn" title="新建渠道">
            <i data-lucide="plus"></i>
          </button>
        </div>

        <form id="alertChannelForm" class="form-grid channel-edit-form">
          <label class="span-2">
            <span>渠道</span>
            <select id="alertChannelConfigSelect">
              <option value="">加载中...</option>
            </select>
          </label>

          <label>
            <span>渠道名称</span>
            <input id="alertChannelNameInput" required maxlength="120" placeholder="例如：生产邮件">
          </label>

          <label>
            <span>渠道类型</span>
            <select id="alertChannelTypeSelect" required>
              <option value="email">邮件</option>
              <option value="sms">短信</option>
              <option value="webhook">Webhook</option>
              <option value="dingtalk">钉钉 Robot</option>
            </select>
          </label>

          <label class="switch-row span-2">
            <input id="alertChannelEnabledInput" type="checkbox" checked>
            <span>启用该渠道</span>
          </label>

          <label class="span-2 channel-field email-channel-field">
            <span>邮箱接收人</span>
            <input id="alertEmailInput" type="text" placeholder="ops@example.com">
          </label>

          <label class="channel-field email-channel-field">
            <span>SMTP 地址</span>
            <input id="smtpHostInput" type="text" placeholder="smtp.example.com">
          </label>

          <label class="channel-field email-channel-field">
            <span>SMTP 端口</span>
            <input id="smtpPortInput" type="number" min="1" max="65535" placeholder="25">
          </label>

          <label class="channel-field email-channel-field">
            <span>SMTP 用户</span>
            <input id="smtpUserInput" type="text" placeholder="monitor@example.com">
          </label>

          <label class="channel-field email-channel-field">
            <span>SMTP 密码</span>
            <input id="smtpPasswordInput" type="password" placeholder="留空则不修改">
          </label>

          <label class="channel-field email-channel-field">
            <span>发件人</span>
            <input id="smtpFromInput" type="text" placeholder="monitor@example.com">
          </label>

          <label class="switch-row channel-field email-channel-field">
            <input id="smtpTlsInput" type="checkbox">
            <span>启用 STARTTLS</span>
          </label>

          <label class="span-2 channel-field sms-channel-field">
            <span>手机号接收人</span>
            <textarea id="alertMobileInput" rows="4" placeholder="13800000000&#10;13900000000"></textarea>
          </label>

          <label class="span-2 channel-field sms-channel-field webhook-channel-field dingtalk-channel-field">
            <span>接口地址</span>
            <input id="smsApiUrlInput" type="url" placeholder="https://sms.example.com/send 或 Webhook URL">
          </label>

          <label class="span-2 channel-field sms-channel-field">
            <span>短信接口 Token</span>
            <input id="smsApiTokenInput" type="password" placeholder="留空则不修改">
          </label>

          <label class="channel-field sms-channel-field">
            <span>短信网关账号</span>
            <input id="smsUsernameInput" type="text" placeholder="xxzx">
          </label>

          <label class="channel-field sms-channel-field">
            <span>返回类型</span>
            <input id="smsRstypeInput" type="text" placeholder="text">
          </label>

          <label class="switch-row span-2 channel-field sms-channel-field">
            <input id="smsPasswordIsMd5Input" type="checkbox" checked>
            <span>密码已是 MD5 密文</span>
          </label>

          <label class="span-2 channel-field sms-channel-field">
            <span>短信网关明文密码</span>
            <input id="smsPasswordInput" type="password" placeholder="留空则不修改">
          </label>

          <label class="span-2 channel-field sms-channel-field">
            <span>短信网关 MD5 密码</span>
            <input id="smsPasswordMd5Input" type="password" placeholder="751CB3F4AA17C36186F4856C8982BF27">
          </label>

          <label class="span-2 channel-field sms-channel-field">
            <span>短信扩展码</span>
            <input id="smsExtCodeInput" type="text" placeholder="不需要时留空">
          </label>

          <div class="form-actions span-2">
            <button class="primary-button" type="submit">
              <i data-lucide="save"></i>
              保存渠道
            </button>
          </div>
        </form>
      </div>

      <aside class="panel">
        <div class="panel-head">
          <h2>服务绑定</h2>
        </div>
        <div class="table-wrap compact-wrap">
          <table class="data-table compact-table">
            <thead>
              <tr>
                <th>服务</th>
                <th>告警组</th>
              </tr>
            </thead>
            <tbody id="alertSettingsTable">
              <tr><td colspan="2" class="empty">加载中...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="panel-head panel-head-inner">
          <h2>最近告警</h2>
        </div>
        <div id="settingsRecentAlerts" class="alert-list">
          <p class="empty">暂无告警</p>
        </div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
