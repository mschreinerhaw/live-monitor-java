<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>添加服务 - Live Monitor</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#176b87">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/vendor/lucide/lucide.min.js"></script>
</head>
<body data-page="add-service">
  <header class="topbar">
    <a class="brand" href="/dashboard">
      <span class="brand-mark">LM</span>
      <span>Live Monitor</span>
    </a>
    <nav class="nav">
      <a href="/dashboard">监控首页</a>
      <a href="/hosts">主机维护</a>
      <a id="serviceFormNav" class="active" href="/services/new">添加服务</a>
      <a href="/alerts/settings">告警设置</a>
    </nav>
  </header>

  <main class="page service-config-page">
    <section class="panel">
      <div class="panel-head">
        <div>
          <h1 id="serviceFormTitle">添加监控服务</h1>
          <p class="panel-subtitle">配置检测目标、探测条件和告警配置</p>
        </div>
      </div>

      <form id="serviceForm" class="form-grid">
        <div class="form-field span-2">
          <span>服务类型</span>
          <select name="service_type" id="serviceType" class="service-type-native-select" required>
            <option value="web">Web 应用 (HTTP/HTTPS)</option>
            <option value="api">API 接口请求</option>
            <option value="process">进程检测</option>
            <option value="port">端口检测 (TCP/UDP)</option>
            <option value="redis">Redis</option>
            <option value="zookeeper">ZooKeeper</option>
            <option value="mysql">MySQL</option>
            <option value="oracle">Oracle</option>
            <option value="postgresql">PostgreSQL</option>
            <option value="jdbc">通用 JDBC</option>
            <option value="cross_database">跨库检测</option>
          </select>
        </div>

        <label>
          <span>服务名称</span>
          <input name="service_name" required maxlength="120" placeholder="例如：交易系统 Web">
        </label>

        <label>
          <span>集群分组</span>
          <input name="cluster_name" placeholder="例如：prod-a">
        </label>

        <label class="span-2">
          <span>监控说明</span>
          <textarea name="monitor_reason" rows="3" maxlength="1000" placeholder="例如：这是核心交易链路入口，需要持续监控可用性和响应时间"></textarea>
        </label>

        <label class="interval-field">
          <span>检测间隔</span>
          <span class="interval-control">
            <input name="check_interval_value" type="number" min="1" max="31536000" value="1" required>
            <select name="check_interval_unit" aria-label="检测间隔单位">
              <option value="seconds">秒</option>
              <option value="minutes" selected>分钟</option>
              <option value="hours">小时</option>
              <option value="days">天</option>
            </select>
          </span>
        </label>

        <label>
          <span>检测超时（秒）</span>
          <input name="check_timeout_seconds" type="number" min="0.2" max="60" step="0.1" value="3" required>
        </label>

        <label class="web-only web-monitor-only">
          <span data-web-label="应用协议" data-api-label="接口协议">应用协议</span>
          <select name="web_scheme">
            <option value="https">HTTPS 应用</option>
            <option value="http">HTTP 应用</option>
          </select>
        </label>

        <label class="web-only web-monitor-only">
          <span data-web-label="URL" data-api-label="接口地址">URL</span>
          <input name="url" type="text" inputmode="url" placeholder="example.com/health 或 https://example.com/health" data-web-placeholder="example.com/health 或 https://example.com/health" data-api-placeholder="api.example.com/v1/health 或 https://api.example.com/v1/health">
        </label>

        <label class="web-only web-monitor-only">
          <span data-web-label="HTTP 方法" data-api-label="请求方法">HTTP 方法</span>
          <select name="http_method">
            <option value="GET">GET</option>
            <option value="HEAD">HEAD</option>
            <option value="POST">POST</option>
          </select>
        </label>

        <label class="web-only web-monitor-only">
          <span data-web-label="状态码校验" data-api-label="接口状态码校验">状态码校验</span>
          <input name="expected_status_code" type="number" min="100" max="599" placeholder="默认 2xx/3xx">
        </label>

        <label class="web-only web-monitor-only span-2">
          <span data-web-label="关键字检测" data-api-label="响应关键字检测">关键字检测</span>
          <input name="response_keyword" placeholder="例如：login success" data-web-placeholder="例如：login success" data-api-placeholder="例如：success、token、业务字段值">
        </label>

        <label class="switch-row web-only web-monitor-only span-2">
          <input name="ignore_ssl_verification" type="checkbox">
          <span>忽略 HTTPS 证书验证（自签名）</span>
        </label>

        <section class="api-form-section api-only span-2">
          <div class="host-form-section-head">
            <h3>请求配置</h3>
          </div>
          <div class="api-form-grid">
            <label class="span-2">
              <span>请求URL *</span>
              <input name="api_url" type="text" inputmode="url" placeholder="https://api.xxx.com/order/query">
            </label>
            <label>
              <span>请求方式 *</span>
              <select name="api_http_method">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="DELETE">DELETE</option>
                <option value="PATCH">PATCH</option>
              </select>
            </label>
            <label>
              <span>Content-Type</span>
              <select name="api_content_type">
                <option value="application/json">application/json</option>
                <option value="application/x-www-form-urlencoded">application/x-www-form-urlencoded</option>
                <option value="multipart/form-data">multipart/form-data</option>
                <option value="text/xml">text/xml</option>
              </select>
            </label>
            <label class="switch-row span-2">
              <input name="api_ignore_ssl_verification" type="checkbox">
              <span>忽略 HTTPS 证书验证（自签名）</span>
            </label>
            <div class="api-header-editor span-2">
              <div class="api-inline-head">
                <span>请求头 Header</span>
                <button id="addApiHeaderBtn" class="ghost-button compact-button" type="button">
                  <i data-lucide="plus"></i>
                  <span>增加</span>
                </button>
              </div>
              <div id="apiHeaderRows" class="api-header-rows"></div>
            </div>
            <label class="api-body-only span-2">
              <span>请求体 Body</span>
              <textarea name="api_request_body" rows="7" spellcheck="false" placeholder='{"custNo":"10001","date":"2026-06-03"}'></textarea>
            </label>
          </div>
        </section>

        <section class="api-form-section api-auth-section api-only span-2">
          <div class="host-form-section-head">
            <h3>认证配置</h3>
          </div>
          <div class="api-form-grid">
            <label>
              <span>认证方式</span>
              <select name="api_auth_type">
                <option value="none">无认证</option>
                <option value="basic">Basic 认证</option>
                <option value="bearer">Bearer Token</option>
                <option value="custom_header">自定义 Header 认证</option>
              </select>
            </label>
            <label class="api-auth-basic">
              <span>用户名</span>
              <input name="api_basic_username" autocomplete="off">
            </label>
            <label class="api-auth-basic">
              <span>密码</span>
              <input name="api_basic_password" type="password" autocomplete="new-password">
            </label>
            <label class="api-auth-bearer span-2">
              <span>Token</span>
              <input name="api_bearer_token" type="password" autocomplete="new-password" placeholder="Bearer Token">
            </label>
            <label class="api-auth-custom">
              <span>AppId</span>
              <input name="api_auth_app_id" autocomplete="off">
            </label>
            <label class="api-auth-custom">
              <span>AppSecret</span>
              <input name="api_auth_app_secret" type="password" autocomplete="new-password">
            </label>
          </div>
        </section>

        <section class="api-form-section api-assert-section api-only span-2">
          <div class="host-form-section-head">
            <h3>响应断言</h3>
          </div>
          <div class="assertion-mode-tabs" role="radiogroup" aria-label="API 响应断言配置方式">
            <label class="assertion-mode-card">
              <input type="radio" name="api_assertion_mode" value="visual" checked>
              <span>可视化配置</span>
            </label>
            <label class="assertion-mode-card">
              <input type="radio" name="api_assertion_mode" value="dsl">
              <span>高级 DSL</span>
            </label>
          </div>
          <div class="api-form-grid">
            <label data-api-assertion-visual>
              <span>状态码</span>
              <input name="api_expected_status_code" type="number" min="100" max="599" value="200">
            </label>
            <label data-api-assertion-visual>
              <span>响应时间小于（ms）</span>
              <input name="api_response_time_ms" type="number" min="1" placeholder="3000">
            </label>
            <label class="span-2" data-api-assertion-visual>
              <span>JSON断言</span>
              <textarea name="api_json_assertions" rows="4" spellcheck="false" placeholder='$.code == 0&#10;$.success == true&#10;$.data.status == "UP"'></textarea>
            </label>
            <label data-api-assertion-visual>
              <span>文本断言</span>
              <select name="api_text_assertion_mode">
                <option value="contains">包含</option>
                <option value="not_contains">不包含</option>
              </select>
            </label>
            <label data-api-assertion-visual>
              <span>文本内容</span>
              <input name="api_text_assertion_value" placeholder="success">
            </label>
            <label class="span-2 assertion-preview-field" data-api-assertion-visual>
              <span>DSL 预览</span>
              <button id="generateApiAssertionDslBtn" class="ghost-button compact-button" type="button">
                <i data-lucide="code-2"></i>
                <span>生成</span>
              </button>
              <textarea id="apiAssertionDslPreview" rows="3" spellcheck="false" readonly hidden placeholder="点击生成后查看 DSL"></textarea>
            </label>
            <label class="span-2" data-api-assertion-dsl hidden>
              <span>高级 DSL 断言</span>
              <textarea name="api_advanced_assertion_expression" rows="4" spellcheck="false" placeholder='json("$.code") == 0 && json("$.status") == "OK" && responseMs() < 3000'></textarea>
              <small class="form-hint">选择高级 DSL 后，上面的可视化断言不会参与保存。</small>
            </label>
          </div>
        </section>

        <section class="api-form-section api-test-section api-only span-2">
          <div class="api-test-head">
            <div>
              <h3>请求测试</h3>
              <p>执行一次真实请求并展示响应结果</p>
            </div>
            <button id="apiTestRequestBtn" class="primary-button" type="button">
              <i data-lucide="send"></i>
              <span>测试请求</span>
            </button>
          </div>
          <div id="apiRequestTestResult" class="api-test-result" hidden></div>
        </section>

        <label class="host-port host-field">
          <span>地址</span>
          <input name="host" placeholder="127.0.0.1">
        </label>

        <label class="host-port port-field">
          <span>端口</span>
          <input name="port" type="number" min="1" max="65535" placeholder="6379">
        </label>

        <label class="process-only">
          <span>监控主机</span>
          <select name="host_id" id="processHostSelect">
            <option value="">按地址匹配已登记主机</option>
          </select>
        </label>

        <label class="process-only">
          <span>进程名称</span>
          <input name="process_name" placeholder="例如：Nginx">
        </label>

        <label class="process-only span-2">
          <span>进程检测命令</span>
          <textarea name="check_command" rows="3" placeholder="例如：pgrep -f nginx >/dev/null"></textarea>
        </label>

        <label class="process-only">
          <span>匹配关键字</span>
          <input name="process_match_keyword" placeholder="例如：nginx">
        </label>

        <label class="process-only">
          <span>匹配方式</span>
          <select name="process_match_mode">
            <option value="exact">精确匹配</option>
            <option value="fuzzy">模糊匹配</option>
          </select>
        </label>

        <label class="process-only">
          <span>最小实例数</span>
          <input name="process_min_instances" type="number" min="1" max="1000" value="1">
        </label>

        <label class="redis-only">
          <span>Redis 用户名</span>
          <input name="redis_username" placeholder="ACL 用户名，可选">
        </label>

        <label class="redis-only">
          <span>Redis 密码</span>
          <input name="redis_password" type="password" placeholder="Redis AUTH 密码">
        </label>

        <label class="switch-row redis-only">
          <input name="redis_cluster_mode" type="checkbox">
          <span>集群模式</span>
        </label>

        <label class="zookeeper-only">
          <span>ZooKeeper 检测方式</span>
          <select name="zookeeper_check_mode">
            <option value="ruok">ruok 四字命令</option>
            <option value="port">仅检测端口连通</option>
          </select>
        </label>

        <label class="zookeeper-only">
          <span>四字命令</span>
          <select name="zookeeper_check_command">
            <option value="ruok">ruok</option>
            <option value="stat">stat</option>
            <option value="mntr">mntr</option>
            <option value="srvr">srvr</option>
          </select>
        </label>

        <label class="zookeeper-only">
          <span>期望节点数</span>
          <input name="zookeeper_expected_nodes" type="number" min="1" max="1000" placeholder="例如：3">
        </label>

        <label class="database-only span-2">
          <span>连接信息来源</span>
          <select name="database_connection_service_id" id="databaseConnectionSelect">
            <option value="">手动填写连接信息</option>
          </select>
          <small class="form-hint">引用已保存的同类型数据库连接，仅复用地址、端口、库名、用户名、密码和驱动；当前服务仍单独配置 SQL、规则和告警。</small>
        </label>

        <label class="database-only standard-database-only database-connection-manual-only">
          <span>数据库名 / 服务名</span>
          <input name="database_name" placeholder="MySQL库名、PostgreSQL库名、Oracle服务名">
        </label>

        <label class="database-only database-connection-manual-only span-2">
          <span>JDBC 驱动类</span>
          <input name="jdbc_driver_class" list="jdbcDriverClassOptions" placeholder="可选，MySQL 5.x：com.mysql.jdbc.Driver；MySQL 8.x：com.mysql.cj.jdbc.Driver">
          <datalist id="jdbcDriverClassOptions">
            <option value="com.mysql.jdbc.Driver"></option>
            <option value="com.mysql.cj.jdbc.Driver"></option>
            <option value="oracle.jdbc.OracleDriver"></option>
            <option value="org.postgresql.Driver"></option>
            <option value="com.microsoft.sqlserver.jdbc.SQLServerDriver"></option>
          </datalist>
        </label>

        <label class="database-only jdbc-only database-connection-manual-only span-2">
          <span>JDBC 连接串</span>
          <input name="jdbc_url" placeholder="例如：jdbc:sqlserver://127.0.0.1:1433;databaseName=master;encrypt=false">
        </label>

        <label class="database-only database-connection-manual-only">
          <span>数据库用户</span>
          <input name="database_username" placeholder="例如：monitor">
        </label>

        <label class="database-only database-connection-manual-only">
          <span>数据库密码</span>
          <input name="database_password" type="password" placeholder="数据库连接密码">
        </label>

        <label class="database-only database-rule-mode-field span-2">
          <span>规则配置方式</span>
          <select name="database_rule_mode">
            <option value="simple" selected>简单规则</option>
            <option value="advanced">高级响应断言规则</option>
          </select>
        </label>

        <label class="database-only database-simple-rule-only">
          <span>期望结果</span>
          <input name="expected_result" placeholder="可选，例如：1">
        </label>

        <label class="database-only database-simple-rule-only">
          <span>结果判断方式</span>
          <select name="database_result_operator">
            <option value="fuzzy">模糊匹配</option>
            <option value="exact">精准匹配</option>
            <option value="eq">等于</option>
            <option value="gt">大于</option>
            <option value="gte">大于等于</option>
            <option value="lt">小于</option>
            <option value="lte">小于等于</option>
          </select>
        </label>

        <section class="api-form-section assertion-config-section result-rule-only span-2">
          <div class="host-form-section-head">
            <h3>高级响应断言规则</h3>
          </div>
          <div class="assertion-mode-tabs" role="radiogroup" aria-label="响应断言配置方式">
            <label class="assertion-mode-card">
              <input type="radio" name="result_assertion_mode" value="visual" checked>
              <span>可视化配置</span>
            </label>
            <label class="assertion-mode-card">
              <input type="radio" name="result_assertion_mode" value="dsl">
              <span>高级 DSL</span>
            </label>
          </div>
          <div class="assertion-mode-panel" data-result-assertion-visual>
            <div class="api-inline-head">
              <span>断言条件</span>
              <button id="addResultAssertionRuleBtn" class="ghost-button compact-button" type="button">
                <i data-lucide="plus"></i>
                <span>增加</span>
              </button>
            </div>
            <div id="resultAssertionRows" class="assertion-rule-rows"></div>
            <div class="api-inline-head assertion-preview-head">
              <span>DSL 预览</span>
              <button id="generateResultAssertionDslBtn" class="ghost-button compact-button" type="button">
                <i data-lucide="code-2"></i>
                <span>生成</span>
              </button>
            </div>
            <label class="assertion-preview-field" hidden>
              <span>生成的 DSL</span>
              <textarea id="resultAssertionDslPreview" rows="3" spellcheck="false" readonly placeholder="点击生成后查看 DSL"></textarea>
            </label>
          </div>
          <label class="assertion-mode-panel" data-result-assertion-dsl hidden>
            <span>高级 DSL 断言</span>
            <textarea name="result_advanced_assertion_expression" rows="4" spellcheck="false" placeholder='contains("success") && json("$.code") == 0'></textarea>
            <small class="form-hint">选择高级 DSL 后，可视化配置不会参与保存。</small>
          </label>
          <input name="api_assertion_expression" type="hidden">
        </section>

        <label class="result-rule-only">
          <span>样例状态码</span>
          <input name="rule_test_status_code" type="number" min="100" max="599" value="200">
        </label>

        <label class="result-rule-only">
          <span>样例耗时（ms）</span>
          <input name="rule_test_response_time_ms" type="number" min="0" value="68">
        </label>

        <label class="result-rule-only span-2">
          <span>样例响应体</span>
          <textarea name="rule_test_body" rows="4" placeholder='{"code":0,"message":"success"}'></textarea>
        </label>

        <label class="database-only span-2">
          <span>检测 SQL</span>
          <input name="database_query" placeholder="留空默认执行 SELECT 1（Oracle 为 SELECT 1 FROM dual）">
          <small class="form-hint">仅允许只读 SELECT；查询预览和检测都会使用超时限制，预览行数受系统配置控制且最多 10 行。</small>
          <small class="form-hint">用于结果判断的查询结果优先取第一行第一列；字段返回 JSON 或文本时可使用返回规则继续判断。</small>
        </label>

        <div id="databasePreviewPanel" class="test-result database-only span-2" hidden></div>

        <section class="api-form-section cross-db-only span-2">
          <div class="host-form-section-head">
            <h3>跨库检测数据源</h3>
            <button id="addCrossDatabaseQueryBtn" class="ghost-button compact-button" type="button">
              <i data-lucide="plus"></i>
              <span>增加数据源</span>
            </button>
          </div>
          <div id="crossDatabaseQueryRows" class="cross-db-query-rows"></div>
          <small class="form-hint">引用已维护的数据源，每个数据源配置独立 SQL 和字段拾取；高级响应断言可使用 field("A.FUND_CODE")、sameValues("A.FUND_CODE","B.FUND_CODE") 等规则进行跨库结果比对。</small>
        </section>

        <section class="host-form-section host-alert-policy-section span-2">
          <div class="host-form-section-head">
            <h3>告警配置</h3>
          </div>
          <div class="host-alert-policy-list">
            <div class="host-alert-policy-row">
              <span class="host-alert-policy-name">服务可用性告警</span>
              <label class="host-alert-policy-toggle switch-row">
                <input name="service_alert_enabled" type="checkbox" checked>
                <span>启用</span>
              </label>
              <label class="host-alert-threshold-field">
                <span>连续失败</span>
                <input name="service_consecutive_failures" type="number" min="1" max="1000" step="1" value="3">
                <em>次</em>
              </label>
              <label class="host-alert-threshold-field">
                <span>恢复确认</span>
                <input name="service_recover_successes" type="number" min="1" max="1000" step="1" value="2">
                <em>次</em>
              </label>
              <label class="host-alert-threshold-field host-alert-duration-field">
                <span>冷却时间</span>
                <input name="service_alert_cooldown_seconds" type="number" min="0" max="31536000" step="1" value="10">
                <select name="service_alert_cooldown_unit" aria-label="冷却时间单位">
                  <option value="seconds">秒</option>
                  <option value="minutes" selected>分钟</option>
                </select>
              </label>
            </div>
          </div>
        </section>

        <label class="span-2">
          <span>告警组</span>
          <select name="alert_group_id" id="serviceAlertGroupSelect">
            <option value="">不绑定告警</option>
          </select>
        </label>

        <label class="switch-row span-2">
          <input name="enabled" type="checkbox" checked>
          <span>启用定时检测</span>
        </label>

        <div id="connectionTestResult" class="test-result span-2" hidden></div>

        <div class="form-actions span-2">
          <a id="serviceFormCancel" class="ghost-button" href="/dashboard">取消</a>
          <button id="testConnectionBtn" class="ghost-button" type="button">
            <i data-lucide="plug-zap"></i>
            <span>测试连接</span>
          </button>
          <button id="testRuleBtn" class="ghost-button result-rule-only" type="button">
            <i data-lucide="flask-conical"></i>
            <span>测试规则</span>
          </button>
          <button id="databasePreviewBtn" class="ghost-button database-only" type="button">
            <i data-lucide="table-2"></i>
            <span>查询预览</span>
          </button>
          <button id="serviceFormSubmit" class="primary-button" type="submit">
            <i data-lucide="save"></i>
            <span>保存服务</span>
          </button>
        </div>
      </form>
