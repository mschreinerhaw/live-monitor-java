<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ServiceMonitor</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/vendor/lucide/lucide.min.js"></script>
</head>
<body data-page="dashboard">
  <div class="dashboard-shell">
    <div class="dashboard-workspace">
      <header class="topbar">
        <label class="search global-search">
          <i data-lucide="search"></i>
          <input id="serviceSearch" type="search" placeholder="&#25628;&#32034;&#26381;&#21153;&#12289;&#38598;&#32676;&#12289;&#22320;&#22336;">
        </label>
      </header>

      <main class="page dashboard-page">
        <div class="dashboard-refresh">
          <span class="live-dot"></span>
          <span>&#26368;&#21518;&#26356;&#26032;:</span>
          <time id="lastRefreshTime">--:--:--</time>
          <button class="icon-button" id="activityRefreshBtn" type="button" title="&#21047;&#26032;" aria-label="&#21047;&#26032;">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>

        <section class="summary-grid status-filter-grid" aria-label="Dashboard summary">
          <article class="metric metric-total active" role="button" tabindex="0" data-filter="all" aria-pressed="true">
            <div class="metric-top">
              <span class="metric-icon"><i data-lucide="layers-3"></i></span>
              <span class="metric-label">&#26381;&#21153;&#24635;&#25968;</span>
            </div>
            <strong id="totalCount">0</strong>
            <small>&#36739;&#26152;&#26085; <span class="trend-up">+1</span></small>
          </article>
          <article class="metric metric-instances" role="button" tabindex="0" aria-pressed="false">
            <div class="metric-top">
              <span class="metric-icon"><i data-lucide="box"></i></span>
              <span class="metric-label">&#23454;&#20363;&#24635;&#25968;</span>
            </div>
            <strong id="instanceCount">0</strong>
            <small>&#36739;&#26152;&#26085; <span class="trend-up">+3</span></small>
          </article>
          <article class="metric metric-up" role="button" tabindex="0" data-filter="UP" aria-pressed="false">
            <div class="metric-top">
              <span class="metric-icon"><i data-lucide="circle-check"></i></span>
              <span class="metric-label">&#27491;&#24120;&#23454;&#20363;</span>
            </div>
            <strong id="upCount">0</strong>
            <small>&#36739;&#26152;&#26085; <span class="trend-up">+2</span></small>
          </article>
          <article class="metric metric-down" role="button" tabindex="0" data-filter="DOWN" aria-pressed="false">
            <div class="metric-top">
              <span class="metric-icon"><i data-lucide="triangle-alert"></i></span>
              <span class="metric-label">&#24322;&#24120;&#23454;&#20363;</span>
            </div>
            <strong id="downCount">0</strong>
            <small>&#36739;&#26152;&#26085; <span class="trend-down">-1</span></small>
          </article>
          <article class="metric metric-alerts" role="button" tabindex="0" aria-pressed="false">
            <div class="metric-top">
              <span class="metric-icon"><i data-lucide="bell"></i></span>
              <span class="metric-label">&#21578;&#35686;&#25968;</span>
            </div>
            <strong id="alertMetric">0</strong>
            <small>&#36739;&#26152;&#26085; <span class="trend-down">+1</span></small>
          </article>
          <span id="unknownCount" hidden>0</span>
        </section>

        <section class="dashboard-content-grid">
          <div class="panel panel-main service-list-panel">
            <div class="panel-head">
              <h1>&#26381;&#21153;&#21015;&#34920;</h1>
              <div class="panel-actions">
                <a class="light-button service-add-button" href="/hosts">
                  <i data-lucide="server"></i>
                  <span>&#20027;&#26426;&#32500;&#25252;</span>
                </a>
                <a class="light-button service-add-button" href="/services/new">
                  <i data-lucide="plus"></i>
                  <span>&#26032;&#22686;&#26381;&#21153;</span>
                </a>
              </div>
            </div>
            <div id="serviceGroupList" class="service-group-list service-workbench">
              <p class="empty">&#21152;&#36733;&#20013;...</p>
            </div>
          </div>

          <aside class="right-rail">
            <section class="panel monitor-side-panel" aria-label="System resource monitoring">
              <div class="panel-head">
                <h2>&#26412;&#22320;&#26381;&#21153;&#36164;&#28304;&#27010;&#35272;</h2>
                <small id="metricRefreshTime">--:--:--</small>
              </div>
              <div class="resource-chart-grid">
                <article class="resource-chart-card" data-metric="cpu">
                  <div class="resource-chart-head">
                    <span><i data-lucide="cpu"></i>CPU</span>
                    <strong id="cpuMetric">0%</strong>
                  </div>
                  <canvas id="cpuChart" width="220" height="56"></canvas>
                </article>
                <article class="resource-chart-card" data-metric="memory">
                  <div class="resource-chart-head">
                    <span><i data-lucide="memory-stick"></i>&#20869;&#23384;</span>
                    <strong id="memoryMetric">0%</strong>
                  </div>
                  <canvas id="memoryChart" width="220" height="56"></canvas>
                </article>
                <article class="resource-chart-card" data-metric="disk">
                  <div class="resource-chart-head">
                    <span><i data-lucide="hard-drive"></i>&#30913;&#30424;</span>
                    <strong id="diskMetric">0%</strong>
                  </div>
                  <canvas id="diskChart" width="220" height="56"></canvas>
                </article>
                <article class="resource-chart-card" data-metric="network">
                  <div class="resource-chart-head">
                    <span><i data-lucide="radio-tower"></i>&#32593;&#32476;</span>
                    <strong id="networkMetric">0 KB/s</strong>
                  </div>
                  <canvas id="networkChart" width="220" height="56"></canvas>
                </article>
              </div>
            </section>

            <section class="panel recent-alerts-panel">
              <div class="panel-head">
                <h2>&#26368;&#36817;&#21578;&#35686;</h2>
                <div class="panel-actions">
                  <button class="text-button danger-text-button" type="button" onclick="clearRecentAlerts()">&#28165;&#29702;</button>
                </div>
              </div>
              <div id="recentAlerts" class="alert-list compact-alert-list">
                <p class="empty">&#26242;&#26080;&#21578;&#35686;</p>
              </div>
            </section>
          </aside>
        </section>

        <footer class="service-page-foot">
          <span>&copy; 2024 ServiceMonitor. All rights reserved.</span>
        </footer>
      </main>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
