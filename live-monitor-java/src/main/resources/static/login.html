<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Live Monitor</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#176b87">
  <link rel="stylesheet" href="/css/login.css">
  <script src="/vendor/lucide/lucide.min.js"></script>
  <style>
    body[data-page="login"] {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(23, 107, 135, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(232, 246, 247, 0.92), rgba(245, 247, 250, 0) 48%),
        var(--bg);
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .login-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 64px;
      padding: 0 28px;
      background: transparent;
    }

    .login-header .brand {
      gap: 12px;
      color: var(--text);
    }

    .login-brand-copy {
      display: grid;
      gap: 2px;
    }

    .login-brand-copy strong {
      font-size: 15px;
      line-height: 1.1;
    }

    .login-brand-copy small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .login-main {
      display: grid;
      place-items: center;
      padding: clamp(32px, 7vh, 72px) 20px;
    }

    .login-card {
      width: min(100%, 452px);
      padding: clamp(26px, 3vw, 34px);
      border: 1px solid #d7e1ec;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 44px rgba(31, 41, 51, 0.12);
    }

    .login-title {
      margin-bottom: 18px;
    }

    .login-title h1 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: 0;
    }

    .login-title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .field-group {
      display: grid;
      gap: 15px;
    }

    .form-field {
      display: grid;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-icon {
      position: absolute;
      left: 13px;
      width: 18px;
      height: 18px;
      color: #60758c;
      pointer-events: none;
    }

    .form-field input {
      width: 100%;
      height: 46px;
      border: 1px solid #c7d4e2;
      border-radius: 8px;
      outline: 0;
      background: #fbfdff;
      color: var(--text);
      padding: 0 42px;
      box-shadow: 0 1px 2px rgba(30, 54, 77, 0.04) inset;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .form-field input::placeholder {
      color: #9aa8b8;
    }

    .form-field input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.13), 0 1px 2px rgba(30, 54, 77, 0.04) inset;
    }

    .eye-btn {
      position: absolute;
      right: 8px;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #7a8da3;
      cursor: pointer;
    }

    .eye-btn:hover,
    .eye-btn:focus-visible {
      background: #f3f7fa;
      color: var(--brand);
      outline: 0;
    }

    .eye-btn svg {
      width: 18px;
      height: 18px;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: 1fr 128px;
      gap: 10px;
      align-items: end;
    }

    .captcha-box {
      display: grid;
      gap: 2px;
      place-items: center;
      height: 46px;
      border: 1px solid #c7d4e2;
      border-radius: 8px;
      background:
        repeating-linear-gradient(135deg, #f3f7fa 0 8px, #ffffff 8px 16px);
      color: var(--brand-strong);
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .captcha-box:hover,
    .captcha-box:focus-visible {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.1);
      outline: 0;
    }

    .captcha-code {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      user-select: none;
    }

    .captcha-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #52667f;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .captcha-hint svg {
      width: 12px;
      height: 12px;
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--brand);
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      background: transparent;
      color: var(--brand);
      font: inherit;
      font-weight: 700;
      padding: 0;
      cursor: pointer;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      color: var(--brand-strong);
      outline: 0;
    }

    .link-btn svg {
      width: 15px;
      height: 15px;
    }

    .error-message {
      min-height: 18px;
      margin: 0 0 8px;
      color: var(--red);
      font-size: 13px;
      line-height: 18px;
    }

    .error-message:empty {
      min-height: 0;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 12px 22px rgba(23, 107, 135, 0.18);
    }

    .login-btn:hover,
    .login-btn:focus-visible {
      background: var(--brand-strong);
      outline: 0;
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .secure-tip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 11px 12px;
      border: 1px solid rgba(22, 138, 82, 0.18);
      border-radius: 8px;
      background: #f0fbf5;
      color: #426257;
      font-size: 13px;
      line-height: 1.5;
    }

    .secure-tip svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      color: var(--green);
    }

    .login-footer {
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .login-header {
        padding: 0 18px;
      }

      .login-main {
        align-items: start;
        padding: 24px 14px;
      }

      .login-card {
        width: 100%;
        padding: 22px;
      }

      .captcha-row {
        grid-template-columns: 1fr;
        align-items: stretch;
      }
    }
  </style>
</head>
<body data-page="login">
  <div class="login-shell">
    <header class="login-header">
      <a class="brand app-brand" href="/dashboard" aria-label="Live Monitor">
        <span class="brand-mark app-brand-mark"><i data-lucide="activity"></i></span>
        <span class="login-brand-copy app-brand-copy">
          <strong>Live Monitor</strong>
          <small>轻量事件驱动监控平台</small>
        </span>
      </a>
    </header>

    <main class="login-main">
      <section class="login-card" aria-label="登录表单">
        <div class="login-title">
          <p>请输入授权账号登录。</p>
        </div>

        <form id="loginForm">
          <div class="field-group">
            <label class="form-field">
              <span>账号</span>
              <span class="input-wrap">
                <i class="field-icon" data-lucide="user"></i>
                <input id="account" name="username" type="text" autocomplete="username" placeholder="请输入账号" required>
              </span>
            </label>

            <label class="form-field">
              <span>密码</span>
              <span class="input-wrap">
                <i class="field-icon" data-lucide="lock-keyhole"></i>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
                <button class="eye-btn" type="button" aria-label="显示或隐藏密码" id="togglePassword">
                  <i data-lucide="eye"></i>
                </button>
              </span>
            </label>

            <div class="captcha-row">
              <label class="form-field">
                <span>验证码</span>
                <span class="input-wrap">
                  <i class="field-icon" data-lucide="shield-check"></i>
                  <input id="captchaInput" type="text" inputmode="text" autocomplete="off" placeholder="请输入验证码" required>
                </span>
              </label>
              <button class="captcha-box" id="captchaButton" type="button" aria-label="刷新验证码" title="点击刷新验证码">
                <span class="captcha-code" id="captchaCode" aria-hidden="true"></span>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember">
              <input id="remember" type="checkbox">
              <span>记住账号</span>
            </label>
            <button class="link-btn refresh" type="button" id="refreshCaptcha" aria-label="刷新验证码" title="点击刷新验证码">
              <i data-lucide="refresh-cw"></i>
              <span>看不清？换一张</span>
            </button>
          </div>

          <div id="loginError" class="error-message" role="alert" aria-live="polite"></div>
          <button id="loginButton" class="login-btn" type="submit">
            <i data-lucide="log-in"></i>
            <span>登录</span>
          </button>

          <div class="secure-tip">
            <i data-lucide="shield"></i>
            <span>已启用访问保护，未登录用户无法进入监控后台。</span>
          </div>
        </form>
      </section>
    </main>

    <footer class="login-footer">
      &copy; 2026 apexSoft. All rights reserved.
    </footer>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const captchaCode = document.querySelector("#captchaCode");
    const captchaInput = document.querySelector("#captchaInput");
    const refreshButtons = [document.querySelector("#captchaButton"), document.querySelector("#refreshCaptcha")];
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");
    const account = document.querySelector("#account");
    const remember = document.querySelector("#remember");
    const loginForm = document.querySelector("#loginForm");
    const loginError = document.querySelector("#loginError");
    const loginButton = document.querySelector("#loginButton");
    const savedAccount = localStorage.getItem("livemuseAccount");
    const captchaChars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let currentCaptcha = "";

    function getSafeRedirect() {
      const redirect = new URLSearchParams(window.location.search).get("redirect");
      if (!redirect || !redirect.startsWith("/") || redirect.startsWith("//")) {
        return "/dashboard";
      }
      return redirect.startsWith("/login.html") ? "/dashboard" : redirect;
    }

    function createCaptcha() {
      currentCaptcha = Array.from({ length: 4 }, () => captchaChars[Math.floor(Math.random() * captchaChars.length)]).join("");
      captchaCode.innerHTML = currentCaptcha.split("").map((char) => `<span>${char}</span>`).join("");
      captchaInput.value = "";
    }

    refreshButtons.forEach((button) => button.addEventListener("click", createCaptcha));

    togglePassword.addEventListener("click", () => {
      password.type = password.type === "password" ? "text" : "password";
      togglePassword.innerHTML = `<i data-lucide="${password.type === "password" ? "eye" : "eye-off"}"></i>`;
      if (window.lucide) window.lucide.createIcons();
    });

    if (savedAccount) {
      account.value = savedAccount;
      remember.checked = true;
    }

    remember.addEventListener("change", () => {
      if (!remember.checked) {
        localStorage.removeItem("livemuseAccount");
      }
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginError.textContent = "";
      const username = account.value.trim();
      const captchaValue = captchaInput.value.trim().toUpperCase();

      if (captchaValue !== currentCaptcha) {
        loginError.textContent = "验证码错误";
        createCaptcha();
        captchaInput.focus();
        return;
      }

      loginButton.disabled = true;
      try {
        await LiveMonitorApi.login(username, password.value);
        if (remember.checked && username) {
          localStorage.setItem("livemuseAccount", username);
        }
        window.location.href = getSafeRedirect();
      } catch (error) {
        loginError.textContent = error.message;
        createCaptcha();
      } finally {
        loginButton.disabled = false;
      }
    });

    LiveMonitorApi.currentUser()
      .then((user) => {
        if (user?.authenticated) {
          window.location.href = getSafeRedirect();
        }
      })
      .catch(() => {});

    createCaptcha();
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
