<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveMuse - Login</title>
  <style>
    :root {
      --deep: #07104c;
      --blue: #1267ff;
      --cyan: #05b6ff;
      --muted: #536ca8;
      --line: rgba(255, 255, 255, 0.76);
      --danger: #c0392b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-width: 1180px;
      min-height: 720px;
      overflow: auto;
      color: var(--deep);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: #dceaff;
    }

    .login-page {
      position: relative;
      width: 100vw;
      min-height: 720px;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 76%, rgba(255, 255, 255, 0.96), transparent 18%),
        radial-gradient(circle at 79% 37%, rgba(255, 255, 255, 0.76), transparent 24%),
        linear-gradient(125deg, #f7fbff 0%, #dfeaff 38%, #c5dbff 71%, #8fb8fb 100%);
    }

    .login-page::before,
    .login-page::after {
      content: "";
      position: absolute;
      pointer-events: none;
      opacity: 0.68;
    }

    .login-page::before {
      inset: auto auto -27vh -8vw;
      width: 118vw;
      height: 52vh;
      border-radius: 50% 50% 0 0;
      background:
        repeating-radial-gradient(ellipse at center, rgba(255, 255, 255, 0.58) 0 1px, transparent 2px 22px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(77, 139, 255, 0.16));
      transform: rotate(-4deg);
    }

    .login-page::after {
      inset: 0 -14vw auto auto;
      width: 65vw;
      height: 78vh;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background:
        repeating-radial-gradient(ellipse at center, rgba(255, 255, 255, 0.48) 0 1px, transparent 2px 18px),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2), transparent 66%);
      transform: rotate(10deg);
    }

    .glow {
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(1px);
    }

    .glow-1 {
      left: 31%;
      top: 16%;
      width: 42vw;
      height: 19vh;
      background: rgba(255, 255, 255, 0.28);
      transform: rotate(-12deg);
    }

    .glow-2 {
      right: -4%;
      bottom: -7%;
      width: 47vw;
      height: 40vh;
      background: rgba(64, 134, 255, 0.22);
    }

    .brand {
      position: absolute;
      z-index: 5;
      top: clamp(32px, 5.2vh, 56px);
      left: clamp(48px, 4.6vw, 88px);
      display: flex;
      align-items: center;
      gap: 18px;
      white-space: nowrap;
    }

    .wordmark {
      font-size: clamp(30px, 2vw, 40px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .wordmark .live {
      color: #ff4a17;
    }

    .wordmark .muse {
      color: #07104c;
    }

    .brand-line {
      width: 2px;
      height: 34px;
      background: linear-gradient(180deg, transparent, #5d84ff, transparent);
    }

    .brand-icon {
      width: 43px;
      height: 43px;
      display: grid;
      place-items: center;
      border: 4px solid #1767ff;
      border-radius: 13px;
      color: #1767ff;
      background: rgba(255, 255, 255, 0.48);
      box-shadow: 0 8px 18px rgba(42, 100, 235, 0.12);
      transform: rotate(30deg);
    }

    .brand-icon span {
      transform: rotate(-30deg);
      font-size: 24px;
      font-weight: 900;
    }

    .brand-name {
      font-size: clamp(22px, 1.35vw, 28px);
      font-weight: 800;
    }

    .hero-art {
      position: absolute;
      z-index: 2;
      left: clamp(40px, 4.8vw, 92px);
      top: clamp(142px, 15.6vh, 168px);
      width: min(53vw, 960px);
      height: min(67vh, 700px);
    }

    .tag {
      position: absolute;
      z-index: 7;
      min-width: 144px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 22px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 12px 24px rgba(45, 86, 172, 0.12), inset 0 0 18px rgba(255, 255, 255, 0.7);
      font-size: 20px;
      font-weight: 800;
    }

    .tag::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 2px;
      height: 76px;
      background: repeating-linear-gradient(180deg, currentColor 0 9px, transparent 9px 18px);
      opacity: 0.72;
    }

    .tag::before {
      content: "";
      position: absolute;
      left: calc(50% - 9px);
      top: calc(100% - 2px);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 18px currentColor;
    }

    .tag-data {
      left: 0.5%;
      top: 18%;
      color: #ff5532;
    }

    .tag-model {
      left: 40%;
      top: 2.8%;
      color: #8e39ff;
    }

    .tag-analyze {
      right: 4%;
      top: 24.2%;
      color: #0e77f3;
      min-width: 150px;
    }

    .monitor-wrap {
      position: absolute;
      left: 30%;
      top: 26%;
      width: 45%;
      height: 49%;
      perspective: 1000px;
    }

    .monitor {
      position: absolute;
      inset: 0 0 17% 0;
      border-radius: 26px;
      background:
        linear-gradient(105deg, rgba(255, 255, 255, 0.94), rgba(234, 243, 255, 0.9)),
        linear-gradient(180deg, #fff, #d7e5ff);
      border: 2px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        22px 22px 42px rgba(24, 84, 212, 0.24),
        -12px -14px 28px rgba(255, 255, 255, 0.88),
        inset -9px -8px 18px rgba(66, 122, 255, 0.12);
      transform: rotateY(-8deg) rotateZ(-4deg);
    }

    .screen {
      position: absolute;
      inset: 36px 34px 30px;
      border-radius: 16px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.95), rgba(227, 238, 255, 0.88));
      box-shadow: inset 0 0 24px rgba(65, 115, 222, 0.11);
    }

    .chart-line {
      position: absolute;
      left: 8%;
      top: 22%;
      width: 48%;
      height: 35%;
      border-radius: 10px;
      background:
        linear-gradient(90deg, rgba(44, 106, 255, 0.1) 1px, transparent 1px) 0 0 / 20% 100%,
        linear-gradient(180deg, rgba(44, 106, 255, 0.12) 1px, transparent 1px) 0 0 / 100% 25%,
        rgba(255, 255, 255, 0.62);
      box-shadow: 0 12px 22px rgba(35, 75, 159, 0.08);
    }

    .chart-line svg {
      position: absolute;
      inset: 10% 7%;
      width: 86%;
      height: 80%;
      overflow: visible;
    }

    .donut {
      position: absolute;
      right: 8%;
      top: 19%;
      width: 24%;
      aspect-ratio: 1;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 12px 22px rgba(35, 75, 159, 0.08);
    }

    .donut::before {
      content: "";
      position: absolute;
      inset: 17%;
      border-radius: 50%;
      background: conic-gradient(#0649ff 0 18%, #2777ff 18% 34%, #79b9ff 34% 48%, #0a5bff 48% 64%, #1732df 64% 79%, #10a8ff 79% 100%);
    }

    .donut::after {
      content: "";
      position: absolute;
      inset: 34%;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #e4efff);
    }

    .list-panel,
    .bars-panel {
      position: absolute;
      bottom: 9%;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 12px 22px rgba(35, 75, 159, 0.08);
    }

    .list-panel {
      left: 8%;
      width: 35%;
      height: 29%;
    }

    .list-panel span {
      position: absolute;
      left: 18%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #136aff, rgba(19, 106, 255, 0.06));
    }

    .list-panel span:nth-child(1) { top: 24%; width: 58%; }
    .list-panel span:nth-child(2) { top: 44%; width: 72%; }
    .list-panel span:nth-child(3) { top: 64%; width: 47%; }

    .bars-panel {
      right: 8%;
      width: 48%;
      height: 29%;
      display: flex;
      align-items: end;
      gap: 16px;
      padding: 0 22px 18px;
    }

    .bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, #78baff, #0759ee);
      box-shadow: 0 0 16px rgba(13, 96, 255, 0.25);
    }

    .bar:nth-child(1) { height: 20%; }
    .bar:nth-child(2) { height: 42%; }
    .bar:nth-child(3) { height: 56%; }
    .bar:nth-child(4) { height: 78%; }
    .bar:nth-child(5) { height: 58%; }
    .bar:nth-child(6) { height: 72%; }
    .bar:nth-child(7) { height: 95%; }

    .stand {
      position: absolute;
      left: 39%;
      bottom: 6%;
      width: 24%;
      height: 18%;
      transform: rotateZ(-4deg);
    }

    .stand::before {
      content: "";
      position: absolute;
      left: 35%;
      top: -15%;
      width: 30%;
      height: 56%;
      background: linear-gradient(180deg, #a8cbff, #4d85ff);
      border-radius: 5px;
    }

    .stand::after {
      content: "";
      position: absolute;
      inset: 35% 0 18%;
      border-radius: 8px;
      background: linear-gradient(180deg, #b9d5ff, #6fa0ff);
      box-shadow: 0 13px 18px rgba(28, 88, 210, 0.22);
    }

    .stage {
      position: absolute;
      left: 19.5%;
      bottom: 2%;
      width: 61%;
      height: 17%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.98) 0 55%, rgba(195, 216, 255, 0.72) 56% 67%, rgba(43, 91, 255, 0.82) 68% 73%, rgba(255, 255, 255, 0.15) 74%),
        linear-gradient(180deg, #fff, #74a3ff);
      box-shadow: 0 24px 30px rgba(31, 84, 211, 0.34), 0 -6px 18px rgba(255, 255, 255, 0.9) inset;
    }

    .login-area {
      position: absolute;
      z-index: 8;
      right: clamp(86px, 9vw, 176px);
      top: clamp(106px, 12.8vh, 138px);
      width: clamp(420px, 26vw, 480px);
    }

    .login-title {
      text-align: center;
      margin-bottom: 44px;
    }

    .login-title h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 2.7vw, 52px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      color: #080f56;
      text-shadow: 0 7px 12px rgba(33, 74, 156, 0.14);
    }

    .login-title p {
      position: relative;
      display: inline-block;
      margin: 0;
      color: #315db4;
      font-size: 23px;
      letter-spacing: 1px;
    }

    .login-title p::before,
    .login-title p::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 28px;
      height: 2px;
      background: #315db4;
    }

    .login-title p::before { right: calc(100% + 14px); }
    .login-title p::after { left: calc(100% + 14px); }

    .title-mark {
      width: 58px;
      height: 6px;
      margin: 16px auto 0;
      border-radius: 999px;
      background: #1166ff;
      box-shadow: 0 5px 14px rgba(17, 102, 255, 0.38);
    }

    .form-field {
      position: relative;
      display: block;
      height: 58px;
      margin-bottom: 18px;
    }

    .form-field input {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      outline: none;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.34);
      color: #153571;
      font-size: 18px;
      padding: 0 58px 0 64px;
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.4),
        0 12px 24px rgba(42, 82, 168, 0.08);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .form-field input::placeholder {
      color: #6d81b6;
    }

    .form-field input:focus {
      border-color: rgba(33, 107, 255, 0.72);
      background: rgba(255, 255, 255, 0.5);
      box-shadow:
        0 0 0 4px rgba(44, 117, 255, 0.12),
        0 14px 28px rgba(42, 82, 168, 0.12);
    }

    .field-icon {
      position: absolute;
      left: 22px;
      top: 50%;
      width: 25px;
      height: 25px;
      transform: translateY(-50%);
      color: #0d63ff;
    }

    .eye-btn {
      position: absolute;
      right: 22px;
      top: 50%;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      color: #2851a8;
      background: transparent;
      transform: translateY(-50%);
      cursor: pointer;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: 1fr 164px;
      gap: 12px;
      align-items: start;
    }

    .captcha-row .form-field {
      margin-bottom: 0;
    }

    .captcha-box {
      position: relative;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 13px;
      overflow: hidden;
      cursor: pointer;
      background:
        radial-gradient(circle, rgba(82, 98, 226, 0.25) 1px, transparent 1px) 0 0 / 15px 15px,
        linear-gradient(135deg, rgba(255, 255, 255, 0.64), rgba(229, 241, 255, 0.28));
      box-shadow: inset 0 0 16px rgba(255, 255, 255, 0.52);
    }

    .captcha-code {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      line-height: 1;
      font-style: italic;
      letter-spacing: 7px;
      user-select: none;
    }

    .captcha-code span:nth-child(1) { color: #6d28d9; }
    .captcha-code span:nth-child(2) { color: #163bd2; }
    .captcha-code span:nth-child(3) { color: #71a943; }
    .captcha-code span:nth-child(4) { color: #2b9c5a; }

    .form-options {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      min-height: 56px;
      margin-top: 10px;
      color: #4566a9;
      font-size: 15px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .remember input {
      width: 20px;
      height: 20px;
      margin: 0;
      accent-color: #1267ff;
    }

    .captcha-actions {
      display: grid;
      justify-items: end;
      gap: 6px;
      color: #0c5bff;
      font-size: 15px;
      font-weight: 700;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      cursor: pointer;
    }

    .refresh {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .error-message {
      min-height: 22px;
      margin: 0 0 10px;
      color: var(--danger);
      font-size: 14px;
      text-align: center;
    }

    .login-btn,
    .sso-btn {
      width: 100%;
      height: 58px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
    }

    .login-btn {
      position: relative;
      color: #fff;
      background: linear-gradient(100deg, #08b9ff 0%, #096bff 55%, #0b39ff 100%);
      box-shadow: 0 14px 28px rgba(10, 83, 230, 0.28);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 13px;
    }

    .login-btn::after {
      content: ">";
      position: absolute;
      right: 26px;
      top: 50%;
      color: rgba(255, 255, 255, 0.28);
      font-size: 34px;
      transform: translateY(-50%);
    }

    .login-btn:disabled {
      opacity: 0.68;
      cursor: wait;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 22px;
      margin: 18px 0 20px;
      color: #425f9e;
      font-size: 17px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, transparent, rgba(54, 103, 189, 0.28));
    }

    .divider::after {
      background: linear-gradient(90deg, rgba(54, 103, 189, 0.28), transparent);
    }

    .sso-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      color: #075bff;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: 0 12px 24px rgba(42, 82, 168, 0.1), inset 0 0 18px rgba(255, 255, 255, 0.5);
      font-size: 17px;
      font-weight: 800;
    }

    .sso-btn svg {
      width: 28px;
      height: 28px;
    }

    .secure-tip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      color: #496397;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    .secure-tip svg {
      width: 21px;
      height: 21px;
      color: #315daf;
    }

    @media (max-width: 1440px) {
      .hero-art {
        left: 24px;
        width: 56vw;
      }

      .login-area {
        right: 5.5vw;
        width: 420px;
      }
    }

    @media (max-height: 820px) {
      .login-area {
        top: 78px;
        transform: scale(0.9);
        transform-origin: top right;
      }

      .hero-art {
        top: 118px;
        height: 66vh;
      }

      .brand {
        top: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header class="brand" aria-label="LiveMuse">
      <div class="wordmark"><span class="live">Live</span><span class="muse">Muse</span></div>
      <div class="brand-line"></div>
      <div class="brand-icon"><span>i</span></div>
      <div class="brand-name">&#28789;&#24863;&#25968;&#25454;&#24037;&#22346;</div>
    </header>

    <section class="hero-art" aria-hidden="true">
      <div class="tag tag-data">&#27934;&#23519;&#25968;&#25454;</div>
      <div class="tag tag-model">&#28789;&#21160;&#24314;&#27169;</div>
      <div class="tag tag-analyze">&#26234;&#33021;&#20998;&#26512;</div>

      <div class="monitor-wrap">
        <div class="monitor">
          <div class="screen">
            <div class="chart-line">
              <svg viewBox="0 0 220 104">
                <defs>
                  <linearGradient id="lineGradient" x1="0" x2="1" y1="0" y2="0">
                    <stop stop-color="#0da1ff"></stop>
                    <stop offset="1" stop-color="#083eff"></stop>
                  </linearGradient>
                </defs>
                <path d="M5 83 C22 49 36 79 52 58 S78 20 104 51 S140 72 161 35 S193 26 215 40" fill="none" stroke="url(#lineGradient)" stroke-width="5" stroke-linecap="round"></path>
              </svg>
            </div>
            <div class="donut"></div>
            <div class="list-panel"><span></span><span></span><span></span></div>
            <div class="bars-panel"><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i></div>
          </div>
        </div>
        <div class="stand"></div>
      </div>
      <div class="stage"></div>
    </section>

    <section class="login-area" aria-label="Login form">
      <div class="login-title">
        <h1>&#27426;&#36814;&#30331;&#24405;</h1>
        <p>&#28789;&#24863;&#25968;&#25454;&#24037;&#22346;</p>
        <div class="title-mark"></div>
      </div>

      <form id="loginForm">
        <label class="form-field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none">
            <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2.2"></circle>
          </svg>
          <input id="account" name="username" type="text" autocomplete="username" placeholder="&#35831;&#36755;&#20837;&#36134;&#21495;" required>
        </label>

        <label class="form-field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none">
            <rect x="5" y="10" width="14" height="11" rx="2" stroke="currentColor" stroke-width="2.2"></rect>
            <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
            <path d="M12 15v2.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
          </svg>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="&#35831;&#36755;&#20837;&#23494;&#30721;" required>
          <button class="eye-btn" type="button" aria-label="Toggle password" id="togglePassword">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="2.1"></path>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2.1"></circle>
            </svg>
          </button>
        </label>

        <div class="captcha-row">
          <label class="form-field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none">
              <path d="M12 3 5 6v5c0 4.7 2.9 8.1 7 10 4.1-1.9 7-5.3 7-10V6l-7-3Z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"></path>
              <path d="m9 12 2 2 4-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <input id="captchaInput" type="text" inputmode="text" autocomplete="off" placeholder="&#35831;&#36755;&#20837;&#39564;&#35777;&#30721;" required>
          </label>
          <button class="captcha-box" id="captchaButton" type="button" aria-label="Refresh captcha">
            <span class="captcha-code" id="captchaCode" aria-hidden="true"></span>
          </button>
        </div>

        <div class="form-options">
          <label class="remember">
            <input id="remember" type="checkbox">
            <span>&#35760;&#20303;&#36134;&#21495;</span>
          </label>
          <div class="captcha-actions">
            <button class="link-btn refresh" type="button" id="refreshCaptcha">
              <span>&#25442;&#19968;&#24352;</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M21 12a9 9 0 0 1-15.2 6.5M3 12A9 9 0 0 1 18.2 5.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                <path d="M18 2v4h4M6 22v-4H2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <button class="link-btn" type="button">&#24536;&#35760;&#23494;&#30721;?</button>
          </div>
        </div>

        <div id="loginError" class="error-message" role="alert" aria-live="polite"></div>
        <button id="loginButton" class="login-btn" type="submit">&#30331;&#24405;</button>
        <div class="divider">&#25110;</div>
        <button class="sso-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M10.5 13.5 13.5 10" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path>
            <path d="M8.8 16.3 7.4 17.7a4.1 4.1 0 0 1-5.8-5.8l3.1-3.1a4.1 4.1 0 0 1 5.8 0" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path>
            <path d="m15.2 7.7 1.4-1.4a4.1 4.1 0 0 1 5.8 5.8l-3.1 3.1a4.1 4.1 0 0 1-5.8 0" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path>
          </svg>
          <span>SSO&#21333;&#28857;&#30331;&#24405;</span>
        </button>

        <div class="secure-tip">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3 5 6v5c0 4.7 2.9 8.1 7 10 4.1-1.9 7-5.3 7-10V6l-7-3Z" stroke="currentColor" stroke-width="2.2"></path>
            <path d="M12 8v4l3 2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>&#25968;&#25454;&#35775;&#38382;&#25480;&#26435;&#25511;&#21046;&#65292;&#25805;&#20316;&#20840;&#31243;&#23457;&#35745;&#30041;&#30165;</span>
        </div>
      </form>
    </section>
  </main>

  <script>
    const captchaCode = document.querySelector("#captchaCode");
    const captchaInput = document.querySelector("#captchaInput");
    const refreshButtons = [document.querySelector("#captchaButton"), document.querySelector("#refreshCaptcha")];
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");
    const account = document.querySelector("#account");
    const remember = document.querySelector("#remember");
    const loginForm = document.querySelector("#loginForm");
    const loginError = document.querySelector("#loginError");
    const loginButton = document.querySelector("#loginButton");
    const savedAccount = localStorage.getItem("livemuseAccount");
    const captchaChars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let currentCaptcha = "";

    function createCaptcha() {
      currentCaptcha = Array.from({ length: 4 }, () => captchaChars[Math.floor(Math.random() * captchaChars.length)]).join("");
      captchaCode.innerHTML = currentCaptcha.split("").map((char) => `<span>${char}</span>`).join("");
      captchaInput.value = "";
    }

    refreshButtons.forEach((button) => button.addEventListener("click", createCaptcha));

    togglePassword.addEventListener("click", () => {
      password.type = password.type === "password" ? "text" : "password";
    });

    if (savedAccount) {
      account.value = savedAccount;
      remember.checked = true;
    }

    remember.addEventListener("change", () => {
      if (!remember.checked) {
        localStorage.removeItem("livemuseAccount");
      }
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginError.textContent = "";
      const username = account.value.trim();
      const captchaValue = captchaInput.value.trim().toUpperCase();

      if (captchaValue !== currentCaptcha) {
        loginError.textContent = "\u9a8c\u8bc1\u7801\u9519\u8bef";
        createCaptcha();
        captchaInput.focus();
        return;
      }

      loginButton.disabled = true;
      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password: password.value }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.detail || payload.message || "\u7528\u6237\u540d\u6216\u5bc6\u7801\u9519\u8bef");
        }
        if (remember.checked && username) {
          localStorage.setItem("livemuseAccount", username);
        }
        window.location.href = "/dashboard";
      } catch (error) {
        loginError.textContent = error.message;
        createCaptcha();
      } finally {
        loginButton.disabled = false;
      }
    });

    createCaptcha();
  </script>
</body>
</html>
