server:
  port: 8000

debug: false

spring:
  # Config database:
  # 1. Default H2 file database. H2 keeps legacy mode and uses ./data/h2/live_monitor.
  # 2. To switch to MySQL as the config database, either set the LIVE_MONITOR_DB_* env vars,
  #    or replace the datasource and sql.init.platform values with the commented MySQL sample below.
  #
  # MySQL sample:
  # datasource:
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   url: jdbc:mysql://127.0.0.1:3306/live_monitor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
  #   username: live_monitor
  #   password: live_monitor_password
  #   hikari:
  #     maximum-pool-size: 10
  #     minimum-idle: 1
  #     connection-timeout: 30000
  # sql:
  #   init:
  #     mode: always
  #     platform: mysql
  #     schema-locations: classpath:schema-${spring.sql.init.platform}.sql
  datasource:
    driver-class-name: ${LIVE_MONITOR_DB_DRIVER:org.h2.Driver}
    url: ${LIVE_MONITOR_DB_URL:jdbc:h2:file:./data/h2/live_monitor;MODE=LEGACY;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=FALSE}
    username: ${LIVE_MONITOR_DB_USERNAME:sa}
    password: ${LIVE_MONITOR_DB_PASSWORD:live_monitor}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 30000
  sql:
    init:
      mode: always
      platform: ${LIVE_MONITOR_DB_PLATFORM:h2}
      schema-locations: classpath:schema-${spring.sql.init.platform}.sql
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

mybatis:
  configuration:
    map-underscore-to-camel-case: true

live-monitor:
  scheduler-tick-seconds: 1
  scheduler-pool-size: 2
  monitor-worker-threads: 4
  monitor-worker-queue-capacity: 100
  default-timeout-seconds: 3
  database-result-max-rows: 5
  database-query-timeout-seconds: 3
  embed-token-long-term: false
  secret-key: ${LIVE_MONITOR_SECRET_KEY:change-this-dev-key}
  template-dir: ./templates
  rocksdb-path: ./data/rocksdb
  sqlite-path: ./data/live_monitor.db
  sqlite-backup-dir: ./data/backup

logging:
  file:
    name: ./logs/live-monitor-java.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
  level:
    root: INFO
