server:
  port: 8000

debug: false

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: "jdbc:h2:file:./data/h2/live_monitor;MODE=LEGACY;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=FALSE"
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 30000
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

mybatis:
  configuration:
    map-underscore-to-camel-case: true

live-monitor:
  scheduler-tick-seconds: 1
  scheduler-pool-size: 2
  monitor-worker-threads: 4
  monitor-worker-queue-capacity: 100
  default-timeout-seconds: 3
  secret-key: ${LIVE_MONITOR_SECRET_KEY:change-this-dev-key}
  template-dir: ./templates
  rocksdb-path: ./data/rocksdb
  sqlite-path: ./data/live_monitor.db
  sqlite-backup-dir: ./data/backup

logging:
  file:
    name: ./logs/live-monitor-java.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
  level:
    root: INFO
