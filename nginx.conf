# Start of the global context

user  root;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
    worker_connections  10240;
}

# Stream block (mail server proxy example)
stream {
    server {
        listen       25;
        proxy_pass   10.4.92.1:25;   # Mail server (e.g., 163 Mail)
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_header_buffer_size 320k;
    large_client_header_buffers 4 320k;

    # Access and error logs
    access_log /var/log/nginx/access.log;

    sendfile        on;
    #tcp_nopush     on;
    keepalive_timeout  120;
    proxy_connect_timeout  300;
    proxy_read_timeout  300;
    proxy_send_timeout  300;

    # Enable gzip compression
    gzip  on;
    
    upstream livebos {
       server 192.168.195.220:10771;
    }
    
    upstream risk-server {
       server 192.168.195.220:10588;
    }
    upstream livedata {
      server 192.168.195.223:10520;
    }
	
	
	upstream gdzq_gateway {
    ip_hash;
    server 192.168.195.223:5006 max_fails=3 fail_timeout=30s;
    server 192.168.195.224:5006 max_fails=3 fail_timeout=30s;
	}

   # upstream livedata-ess {
   #   server 192.168.195.223:10620;
   # }

    # Handle upgrade for WebSockets (if applicable)
    map $http_upgrade $connection_upgrade {
       default upgrade;
       '' close;
    }

    server {
        listen     10501;
        server_name  localhost; 
        client_max_body_size 300M; 

        # 静态页面目录（用于访问自定义 html，避免 file://）
        # 请把 /opt/custom-pages/ 改成你的实际目录
        location ^~ /pages/ {
           alias /home/livebos/nginx/custom-pages/;   # 你的静态页面目录
           index index.html;
           try_files $uri $uri/ =404;  # 多页面场景不要强制回退到某个固定html
        }

        # 通过 /livebos/pages/ 路径访问同一套静态页面
        location ^~ /livebos/pages/ {
           alias /home/livebos/nginx/custom-pages/;
           index index.html;
           try_files $uri $uri/ =404;
        }

        # Proxy to livebos server
        location / {
            proxy_pass http://livebos/;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;
        }
        
        location /UIProcessor {
             proxy_pass http://livebos;
             proxy_set_header Host $host:$server_port;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header REMOTE-HOST $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header Cookie $http_cookie;
        }

        # Proxy to risk-server
        location /riskServer {
            proxy_pass http://192.168.195.220:10588/riskServer;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache off;
            proxy_buffering off;
            chunked_transfer_encoding on;
            tcp_nopush on;
            tcp_nodelay on;
            keepalive_timeout 300;
            add_header Last-Modified $date_gmt;
            add_header Cache-Control "no-store";
        }

	 # Proxy to mcp
        location /mcp/manage {
            proxy_pass http://192.168.195.204:8084/mcp/manage;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Last-Modified $date_gmt;
        }

	 # Proxy to mcp
        location /mcp {
            proxy_pass http://192.168.195.204:8087/mcp;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Last-Modified $date_gmt;
        }

       location /gdzq/ {
            rewrite ^/gdzq/(.*)$ /$1 break;
            proxy_pass http://192.168.195.223:5006;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header Cookie $http_cookie;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            
            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
		}

	
	location /alert {
	    proxy_pass http://192.168.195.220:10589/alert;
	    proxy_set_header Host $host:$server_port;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header REMOTE-HOST $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    add_header Last-Modified $date_gmt;
	}

        # Proxy for aiServer/api
        location ^~ /aiServer/api {
            proxy_pass http://192.168.195.243:10501;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            keepalive_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }

        # WebSocket and long connections handling
        location /subscriptions {
            proxy_pass http://livedata/subscriptions;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Other proxies (livedata related)
        location /livedata {
            proxy_pass http://livedata/livedata;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /graphql {
            proxy_pass http://livedata/graphql;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /picture {
            proxy_pass http://livedata/picture;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Data Studio and other data sources
        location /data-studio-frame {
            proxy_pass  http://livedata/data-studio-frame;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header referer '';
        }

        # Example of other data services
        location /data-source {
            proxy_pass http://livedata/data-source;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy for maintenance center
        location /maintenance-center {
            proxy_pass http://livedata/maintenance-center;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
		
        location /query-center {
            proxy_pass http://192.168.195.223:10620/query-center;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        
		location /data-manage {
            proxy_pass http://livedata/data-manage;
