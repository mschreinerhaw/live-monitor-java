    server {
    listen 20774;
    server_name localhost;
    client_max_body_size 300M;
    
        location /graphql {
            proxy_pass http://192.168.195.223:10620/graphql;
            proxy_set_header Host $host;
            proxy_hide_header X-Frame-Options;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
       location /react/ {
            proxy_pass http://192.168.195.223:10620/react/;
            proxy_set_header Host $host;
            proxy_hide_header X-Frame-Options;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /livedata-ess/ {
        proxy_pass http://192.168.195.223:10620/livedata-ess/;
            proxy_set_header Host $host;
            proxy_hide_header X-Frame-Options;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
    }
    
        location /data-insight/ {
            proxy_pass http://192.168.195.223:10620/data-insight/;
            # 重要的代理头设置
            proxy_set_header Host 192.168.195.223:10620;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        
        # 解决可能的权限问题
            proxy_set_header Authorization "";
            proxy_hide_header X-Frame-Options;  # 移除原始X-Frame-Options
            #add_header X-Frame-Options "ALLOW-FROM *" always;  # 设置新的
            
        # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
        # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
    }
    
        location /query-center/ {
            proxy_pass http://192.168.195.223:10620/query-center/;
            # 重要的代理头设置
            proxy_set_header Host 192.168.195.223:10620;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        
        # 解决可能的权限问题
            proxy_set_header Authorization "";
            proxy_hide_header X-Frame-Options;  # 移除原始X-Frame-Options
            #add_header X-Frame-Options "ALLOW-FROM *" always;  # 设置新的
            
        # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
        # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
    }
    
    }

