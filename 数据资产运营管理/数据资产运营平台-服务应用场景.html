<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveMuse 灵感数据工坊 - 服务应用场景</title>
    <style>
      :root {
        --blue: #1557ff;
        --blue2: #0b45e8;
        --text: #111827;
        --sub: #65708a;
        --muted: #8a94aa;
        --line: #e8edf6;
        --bg: #f7f9fd;
        --card: #fff;
        --shadow: 0 10px 28px rgba(22, 35, 65, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          Arial, sans-serif;
        color: var(--text);
      }
      .header {
        height: 74px;
        background: #fff;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 26px;
        position: sticky;
        top: 0;
        z-index: 20;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.3px;
      }
      .brand .live {
        color: #f5222d;
      }
      .logo-box {
        width: 40px;
        height: 40px;
        border: 2px solid #2463ff;
        border-radius: 12px;
        display: grid;
        place-items: center;
        color: #2463ff;
        font-size: 20px;
      }
      .brand-sub {
        font-size: 21px;
        font-weight: 800;
        color: #111827;
      }
      .nav {
        display: flex;
        align-items: center;
        gap: 34px;
        margin-left: 40px;
      }
      .nav a {
        height: 74px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #172033;
        font-size: 17px;
        font-weight: 800;
        text-decoration: none;
        border-bottom: 4px solid transparent;
      }
      .nav a.active {
        color: var(--blue);
        border-bottom-color: var(--blue);
      }
      .nav-wrap {
        display: flex;
        align-items: center;
      }
      .top-icons {
        display: flex;
        align-items: center;
        gap: 22px;
        color: #111a44;
        font-size: 24px;
      }
      .top-badge {
        position: relative;
        display: inline-flex;
      }
      .top-badge i {
        position: absolute;
        right: -8px;
        top: -10px;
        min-width: 18px;
        height: 18px;
        padding: 0 4px;
        background: #f5222d;
        color: #fff;
        border-radius: 999px;
        font-size: 11px;
        font-style: normal;
        display: grid;
        place-items: center;
        font-weight: 900;
      }
      .user {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        font-size: 12px;
        font-weight: 800;
      }
      .user span {
        font-size: 22px;
      }
      .page {
        display: grid;
        grid-template-columns: minmax(820px, 1fr) 330px;
        gap: 28px;
        padding: 20px 26px 30px;
        transition: grid-template-columns 0.24s ease;
      }
      .page.sidebar-collapsed {
        grid-template-columns: minmax(820px, 1fr) 72px;
      }
      .breadcrumb {
        display: flex;
        gap: 12px;
        align-items: center;
        color: #4d5b7c;
        font-size: 14px;
        font-weight: 800;
        margin: 4px 0 18px;
      }
      .title h1 {
        font-size: 27px;
        line-height: 1.1;
        margin: 0 0 12px;
      }
      .title p {
        margin: 0;
        color: #65708a;
        font-size: 14px;
        font-weight: 700;
      }
      .search-bar {
        width: 320px;
        height: 40px;
        margin-top: 20px;
        border: 1px solid var(--line);
        border-radius: 9px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        background: #fff;
        color: #7b86a0;
        box-shadow: 0 3px 10px rgba(22, 35, 65, 0.03);
      }
      .search-bar input {
        border: 0;
        outline: 0;
        flex: 1;
        font-size: 14px;
        color: #334155;
      }
      .tabs {
        height: 54px;
        margin: 22px 0 18px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        display: grid;
        grid-template-columns: 110px repeat(7, 1fr) 90px;
        align-items: center;
        padding: 0;
        overflow: hidden;
      }
      .tab {
        height: 54px;
        display: grid;
        place-items: center;
        color: #172033;
        font-size: 15px;
        font-weight: 900;
        cursor: pointer;
      }
      .tab.active {
        height: 38px;
        margin: 8px 0 8px 0;
        background: var(--blue);
        color: white;
        border-radius: 7px;
        box-shadow: 0 8px 16px rgba(21, 87, 255, 0.18);
      }
      .tab.more {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .scenario-list {
        display: grid;
        gap: 14px;
      }
      .scenario-card {
        min-height: 92px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(22, 35, 65, 0.035);
        display: grid;
        grid-template-columns: 300px 1px minmax(300px, 1fr) 130px 160px;
        align-items: center;
        padding: 18px 20px;
        transition: 0.2s ease;
      }
      .scenario-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 26px rgba(22, 35, 65, 0.08);
        border-color: #dbe7ff;
      }
      .left-info {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .scene-icon {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        font-size: 38px;
        line-height: 1;
        background: none;
        border: 0;
        box-shadow: none;
        flex: none;
      }
      .scene-icon.blue {
        color: #1557ff;
      }
      .scene-icon.purple {
        color: #8b3ffc;
      }
      .scene-icon.green {
        color: #22c55e;
      }
      .scene-icon.orange {
        color: #ff8a00;
      }
      .scene-icon.teal {
        color: #14b8a6;
      }
      .scene-icon.gold {
        color: #f59e0b;
      }
      .scene-title {
        font-size: 17px;
        font-weight: 900;
        margin-bottom: 8px;
      }
      .scene-count {
        color: #1f2a44;
        font-size: 14px;
        font-weight: 800;
      }
      .separator {
        height: 58px;
        background: #e6ebf5;
      }
      .mid-desc {
        padding: 0 28px;
      }
      .desc {
        color: #334155;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.7;
        margin-bottom: 8px;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag {
        min-width: 66px;
        height: 24px;
        border-radius: 5px;
        padding: 0 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 900;
      }
      .tag.blue {
        color: #2563eb;
        background: #eef5ff;
        border: 1px solid #cfe0ff;
      }
      .tag.purple {
        color: #8b3ffc;
        background: #f6edff;
        border: 1px solid #e2cfff;
      }
      .tag.green {
        color: #10b981;
        background: #edfff8;
        border: 1px solid #bfefdb;
      }
      .tag.orange {
        color: #ff7a00;
        background: #fff7ed;
        border: 1px solid #ffd8ad;
      }
      .action {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #0f2d70;
        font-size: 14px;
        font-weight: 900;
        white-space: nowrap;
        cursor: pointer;
      }
      .apply-box {
        height: 38px;
        border-left: 1px solid #e6ebf5;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .apply-btn {
        height: 38px;
        min-width: 96px;
        padding: 0 16px;
        border: 1px solid #cfe0ff;
        border-radius: 8px;
        background: #f8fbff;
        color: #1557ff;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(21, 87, 255, 0.06);
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }
      .apply-btn:hover {
        background: #eef5ff;
        border-color: #1557ff;
        box-shadow: 0 8px 18px rgba(21, 87, 255, 0.12);
        transform: translateY(-1px);
      }
      .apply-btn:active {
        transform: translateY(0);
        box-shadow: 0 3px 8px rgba(21, 87, 255, 0.1);
      }
      .apply-btn:focus-visible {
        outline: 2px solid rgba(21, 87, 255, 0.24);
        outline-offset: 2px;
      }
      .foot {
        height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 4px;
        color: #44516f;
        font-size: 14px;
        font-weight: 800;
      }
      .pages,
      .page-tools {
        display: flex;
        align-items: center;
        gap: 16px;
        white-space: nowrap;
      }
      .page-num {
        min-width: 34px;
        height: 34px;
        padding: 0 8px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      .page-num.active {
        color: var(--blue);
        background: #fff;
        border: 1px solid #dbe7ff;
        box-shadow: 0 4px 12px rgba(21, 87, 255, 0.06);
      }
      .page-input,
      .page-size {
        height: 34px;
        width: 42px;
        border: 1px solid #d9e5fb;
        border-radius: 8px;
        background: #fff;
        color: #172033;
        font-size: 14px;
        font-weight: 800;
        text-align: center;
        outline: none;
      }
      .page-size {
        width: 58px;
      }
      .side {
        display: grid;
        gap: 18px;
        align-content: start;
        position: sticky;
        top: 94px;
        max-height: calc(100vh - 112px);
        overflow: visible;
      }
      .side-toggle {
        width: 28px;
        height: 56px;
        border: 1px solid #d9e5fb;
        border-radius: 999px;
        background: #fff;
        color: #1557ff;
        display: grid;
        place-items: center;
        position: absolute;
        left: -15px;
        top: 50%;
        z-index: 2;
        transform: translateY(-50%);
        font-size: 18px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(22, 35, 65, 0.05);
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          box-shadow 0.2s ease;
      }
      .side-toggle:hover {
        background: #f5f8ff;
        border-color: #b9cdfd;
        box-shadow: 0 8px 20px rgba(21, 87, 255, 0.12);
      }
      .toggle-icon {
        width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        line-height: 1;
        transition: transform 0.24s ease;
      }
      .panel {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 18px;
        min-width: 0;
        transition:
          padding 0.24s ease,
          border-color 0.24s ease,
          box-shadow 0.24s ease;
      }
      .quick-panel {
        position: relative;
      }
      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .panel-title {
        font-size: 20px;
        font-weight: 900;
      }
      .panel-link {
        color: #34405a;
        font-size: 13px;
        font-weight: 900;
      }
      .quick-list {
        display: grid;
        gap: 20px;
      }
      .quick-item {
        display: grid;
        grid-template-columns: 34px 1fr 26px;
        align-items: center;
        gap: 12px;
      }
      .quick-icon {
        font-size: 24px;
        color: #10205c;
        display: grid;
        place-items: center;
        background: none;
      }
      .quick-name {
        font-weight: 900;
        font-size: 15px;
        margin-bottom: 4px;
      }
      .quick-sub {
        color: #758198;
        font-size: 13px;
        font-weight: 700;
      }
      .quick-num {
        text-align: right;
        font-size: 19px;
        font-weight: 900;
        color: #f5222d;
      }
      .quick-num.blue {
        color: var(--blue);
      }
      .hot-list {
        display: grid;
        gap: 18px;
      }
      .hot-item {
        display: grid;
        grid-template-columns: 28px 1fr auto;
        align-items: center;
        gap: 12px;
      }
      .hot-ico {
        width: 24px;
        height: 24px;
        border-radius: 5px;
        display: grid;
        place-items: center;
        color: white;
        font-size: 13px;
        font-weight: 900;
      }
      .hot-title {
        font-size: 15px;
        font-weight: 900;
      }
      .hot-use {
        color: #65708a;
        font-size: 12px;
        font-weight: 800;
      }
      .page.sidebar-collapsed .side {
        gap: 12px;
        overflow: visible;
      }
      .page.sidebar-collapsed .toggle-icon {
        transform: rotate(180deg);
      }
      .page.sidebar-collapsed .panel {
        padding: 12px 10px;
      }
      .page.sidebar-collapsed .panel-head {
        justify-content: center;
        margin-bottom: 12px;
      }
      .page.sidebar-collapsed .panel-title {
        color: #44516f;
        font-size: 12px;
        line-height: 1.2;
        letter-spacing: 0;
        writing-mode: vertical-rl;
      }
      .page.sidebar-collapsed .panel-link,
      .page.sidebar-collapsed .quick-name,
      .page.sidebar-collapsed .quick-sub,
      .page.sidebar-collapsed .hot-title,
      .page.sidebar-collapsed .hot-use {
        display: none;
      }
      .page.sidebar-collapsed .quick-list,
      .page.sidebar-collapsed .hot-list {
        gap: 12px;
      }
      .page.sidebar-collapsed .quick-item {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 0;
        min-height: 40px;
        position: relative;
      }
      .page.sidebar-collapsed .quick-icon {
        width: 38px;
        height: 38px;
        border-radius: 11px;
        background: #f5f8ff;
        font-size: 20px;
      }
      .page.sidebar-collapsed .quick-num {
        position: absolute;
        right: -4px;
        top: -4px;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 999px;
        background: #fff2f2;
        border: 1px solid #ffd3d3;
        display: grid;
        place-items: center;
        color: #f5222d;
        font-size: 11px;
        line-height: 1;
      }
      .page.sidebar-collapsed .quick-num.blue {
        background: #eef5ff;
        border-color: #cfe0ff;
        color: var(--blue);
      }
      .page.sidebar-collapsed .hot-item {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 0;
        min-height: 34px;
      }
      .page.sidebar-collapsed .hot-ico {
        width: 34px;
        height: 34px;
        border-radius: 10px;
      }
      .page.sidebar-collapsed .ai {
        display: none;
      }
      .page.sidebar-collapsed .scenario-list {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
      }
      .page.sidebar-collapsed .scenario-card {
        min-height: 266px;
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto auto;
        align-items: stretch;
        gap: 14px;
        padding: 20px;
      }
      .page.sidebar-collapsed .scenario-card:hover {
        transform: translateY(-2px);
      }
      .page.sidebar-collapsed .left-info {
        align-items: flex-start;
        gap: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid #edf2fb;
      }
      .page.sidebar-collapsed .scene-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: #f5f8ff;
        font-size: 30px;
      }
      .page.sidebar-collapsed .scene-title {
        font-size: 18px;
        margin-bottom: 7px;
      }
      .page.sidebar-collapsed .separator {
        display: none;
      }
      .page.sidebar-collapsed .mid-desc {
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 12px;
      }
      .page.sidebar-collapsed .desc {
        margin-bottom: 0;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        overflow: hidden;
      }
      .page.sidebar-collapsed .action {
        justify-content: flex-start;
        padding-top: 2px;
      }
      .page.sidebar-collapsed .apply-box {
        height: auto;
        border-left: 0;
        justify-content: stretch;
      }
      .page.sidebar-collapsed .apply-btn {
        width: 100%;
        height: 40px;
      }
      .ai {
        padding: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #fffaf0 0%, #fff 100%);
      }
      .ai-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px 0;
      }
      .new {
        background: #fff3e8;
        color: #ff3b00;
        border-radius: 999px;
        padding: 3px 11px;
        font-size: 12px;
        font-weight: 900;
      }
      .ai-body {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px;
        align-items: center;
        padding: 12px 18px 18px;
      }
      .robot {
        width: 116px;
        height: 116px;
        border-radius: 24px;
        background: linear-gradient(180deg, #eaf5ff, #fff);
        display: grid;
        place-items: center;
        font-size: 72px;
      }
      .ai-body b {
        font-size: 15px;
        display: block;
        margin-bottom: 10px;
      }
      .ai-body p {
        margin: 0 0 14px;
        color: #65708a;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.7;
      }
      .ai-btn {
        height: 42px;
        width: 120px;
        border: 0;
        border-radius: 7px;
        background: #ff4b1f;
        color: white;
        font-size: 16px;
        font-weight: 900;
        box-shadow: 0 8px 16px rgba(255, 75, 31, 0.18);
        cursor: pointer;
      }
      @media (max-width: 1280px) {
        .page {
          grid-template-columns: 1fr;
        }
        .page.sidebar-collapsed {
          grid-template-columns: 1fr;
        }
        .side {
          grid-template-columns: repeat(3, 1fr);
          position: static;
          max-height: none;
          overflow: visible;
        }
        .page.sidebar-collapsed .side {
          grid-template-columns: 72px 72px;
          justify-content: end;
        }
        .scenario-card {
          grid-template-columns: 260px 1px 1fr 120px 150px;
        }
      }
      @media (max-width: 980px) {
        .tabs {
          grid-template-columns: repeat(3, 1fr);
          height: auto;
        }
        .tab {
          height: 44px;
        }
        .scenario-card {
          grid-template-columns: 1fr;
          gap: 14px;
        }
        .separator,
        .apply-box {
          border: 0;
          height: auto;
        }
        .apply-box {
          justify-content: flex-start;
        }
        .mid-desc {
          padding: 0;
        }
        .side {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="nav-wrap">
        <div class="lm-logo" onclick="location.href='数据资产运营管理平台-数据服务中心.html'" style="width:292px;display:flex;align-items:center;gap:8px;flex:none;cursor:pointer">
          <span style="font-size:22px;font-weight:900;line-height:1;white-space:nowrap"><span style="color:#ff1f1f">Live</span><span style="color:#111827">Muse</span></span>
          <svg viewBox="0 0 52 46" aria-hidden="true" style="width:44px;height:39px;flex:none">
            <polygon points="26 2 48 14 48 32 26 44 4 32 4 14" fill="#fff" stroke="#4f73ff" stroke-width="2.2"></polygon>
            <circle cx="26" cy="13" r="2.2" fill="#4f73ff"></circle>
            <path d="M26 19v15" stroke="#4f73ff" stroke-width="3" stroke-linecap="round"></path>
            <path d="M20 34h12" stroke="#4f73ff" stroke-width="2.6" stroke-linecap="round"></path>
          </svg>
          <span style="font-size:19px;font-weight:900;color:#111827;white-space:nowrap">灵感数据工坊</span>
        </div>
        <nav class="nav">
          <a class="active" href="数据资产运营管理平台-数据服务中心.html"
            >🏠 服务中心</a
          >
          <a href="数据资产运营管理平台-服务申请详情.html">♙ 我的工作台</a>
        </nav>
      </div>
      <div class="top-icons">
        <span>⌕</span>
        <span class="top-badge">♧<i>6</i></span>
        <span class="top-badge">✉<i>73</i></span>
        <span class="top-badge">☵<i>24</i></span>
        <div class="user">业务人员</div>
        <!-- <span>♙</span> -->
      </div>
    </header>

    <div class="page">
      <main>
        <div class="breadcrumb">
          <span
            onclick="location.href='数据资产运营管理平台-数据服务中心.html'"
            style="cursor: pointer"
            >服务中心</span
          ><span>›</span><span>服务应用场景</span>
