<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分支机构展业统计-领导看板</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #e4eaf3;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --high: #ef4444;
      --mid: #f59e0b;
      --low: #10b981;
      --shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      line-height: 1.4;
      font-size: 14px;
    }

    .page {
      max-width: 1380px;
      margin: 0 auto;
      padding: 12px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .field {
      height: 42px;
      border: 1px solid #e3e9f4;
      border-radius: 8px;
      background: #f8faff;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
    }

    .field label {
      min-width: 72px;
      color: #334155;
      font-size: 15px;
    }

    .field input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      color: var(--text);
      font-size: 15px;
    }

    .btn {
      height: 42px;
      min-width: 104px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn.primary { background: var(--primary); color: #fff; }
    .btn.ghost { background: #f3f4f6; border-color: #e5e7eb; color: #111827; }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.18);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 12px 0 10px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .status-row.error { color: var(--high); }

    .refresh-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #d8e1f1;
      border-radius: 50%;
      background: #fff;
      color: var(--primary);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .summary {
      border: 1px solid #dce8ff;
      background: linear-gradient(90deg, #eff5ff 0%, #f6fbff 100%);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .summary-title {
      font-size: 12px;
      color: #475569;
      margin-bottom: 4px;
      letter-spacing: 0.2px;
    }

    .summary-main {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.35;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi-card {
      border: 1px solid #e6edf7;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      min-height: 88px;
    }

    .kpi-label {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 34px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1;
    }

    .leaderboard {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .board-head {
      padding: 10px 12px;
      border-bottom: 1px dashed #e6edf7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .board-title {
      font-size: 24px;
      font-weight: 800;
      margin: 0;
      color: #0f172a;
    }

    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
      color: #64748b;
      font-size: 12px;
      flex-wrap: wrap;
    }

    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    .rank-list {
      padding: 10px;
      max-height: 58vh;
      overflow: auto;
    }

    .rank-item {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 1.4fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid #e6edf7;
      border-radius: 10px;
      background: #f8fbff;
      padding: 10px;
      margin-bottom: 9px;
    }

    .rank-left { display: flex; align-items: center; gap: 8px; min-width: 0; }

    .rank-no {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: #dbe3f0;
      color: #0f172a;
      flex: none;
    }

    .rank-no.top1 { background: #f59e0b; color: #fff; }
    .rank-no.top2 { background: #94a3b8; color: #fff; }
    .rank-no.top3 { background: #b45309; color: #fff; }

    .rank-name {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-sub {
      margin-top: 2px;
      color: #64748b;
      font-size: 12px;
    }

    .rank-track {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #e7edf7;
    }

    .rank-fill { height: 100%; border-radius: inherit; min-width: 2px; }
    .rank-fill.high { background: linear-gradient(90deg, #ef4444, #f87171); }
    .rank-fill.mid { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .rank-fill.low { background: linear-gradient(90deg, #10b981, #34d399); }

    .rank-right { display: flex; align-items: center; gap: 8px; }

    .rank-pct {
      min-width: 46px;
      text-align: right;
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }

    .risk-tag {
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
    }

    .risk-tag.high { color: #b91c1c; background: #fef2f2; border-color: #fecaca; }
    .risk-tag.mid { color: #b45309; background: #fffbeb; border-color: #fde68a; }
    .risk-tag.low { color: #047857; background: #ecfdf5; border-color: #a7f3d0; }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 34px 0;
      font-size: 14px;
    }

    @media (max-width: 1140px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar > :nth-child(3) { display: none; }
      .kpi-grid { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
      .rank-item { grid-template-columns: 1fr; gap: 8px; }
      .rank-right { justify-content: flex-end; }
    }

    @media (max-width: 720px) {
      .page { padding: 8px; }
      .toolbar { grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .summary-main { font-size: 18px; }
      .board-title { font-size: 20px; }
      .kpi-value { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="toolbar">
        <div class="field">
          <label for="startDate">开始日期:</label>
          <input id="startDate" type="date" />
        </div>
        <div class="field">
          <label for="endDate">结束日期:</label>
          <input id="endDate" type="date" />
        </div>
        <div></div>
        <button id="btnSearch" class="btn primary">查询</button>
        <button id="btnReset" class="btn ghost">重置</button>
      </div>

      <hr class="divider" />

      <div id="statusRow" class="status-row">
        <div id="statusText">等待查询</div>
        <button id="btnRefresh" class="refresh-btn" title="刷新">↻</button>
      </div>

      <section class="summary">
        <div class="summary-title">一句话结论</div>
        <div id="summaryText" class="summary-main">等待数据加载...</div>
      </section>

      <section id="kpiGrid" class="kpi-grid"></section>

      <section class="leaderboard">
        <div class="board-head">
          <h3 class="board-title">风险排行榜</h3>
          <div class="legend">
            <span><i style="background:#ef4444"></i>高风险</span>
            <span><i style="background:#f59e0b"></i>中风险</span>
            <span><i style="background:#10b981"></i>低风险</span>
          </div>
        </div>
        <div id="rankList" class="rank-list"></div>
      </section>
    </div>
  </div>

  <script src="./common/api.js"></script>
  <script>
    (function () {
      const API_ENDPOINT = "/UIProcessor";
      const TOP_N = 12;

      const state = {
        orgRows: [],
        ownerRows: [],
        loading: false
      };

      const el = {
        startDate: document.getElementById("startDate"),
        endDate: document.getElementById("endDate"),
        btnSearch: document.getElementById("btnSearch"),
        btnReset: document.getElementById("btnReset"),
        btnRefresh: document.getElementById("btnRefresh"),
        statusRow: document.getElementById("statusRow"),
        statusText: document.getElementById("statusText"),
        summaryText: document.getElementById("summaryText"),
        kpiGrid: document.getElementById("kpiGrid"),
        rankList: document.getElementById("rankList")
      };

      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function setStatus(text, isError) {
        el.statusText.textContent = text;
        el.statusRow.className = isError ? "status-row error" : "status-row";
      }

      function todayText() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function toNumber(v) {
        if (typeof v === "number") {
          return Number.isFinite(v) ? v : 0;
        }
        if (v === null || v === undefined || v === "") {
          return 0;
        }
        const n = parseFloat(String(v).replace(/,/g, ""));
        return Number.isFinite(n) ? n : 0;
      }

      function fmtNum(v) {
        return String(Math.round(toNumber(v) * 100) / 100);
      }

      function fmtPct(v) {
        return (Math.max(0, toNumber(v)) * 100).toFixed(2) + "%";
      }

      function readValue(v) {
        if (v === null || v === undefined) {
          return "";
        }
        if (typeof v === "object") {
          return String(v.text || v.value || "");
        }
        return String(v);
      }

      function sanitizeJsonText(text) {
        if (!text) {
          return "";
        }
        return String(text)
          .replace(/^\uFEFF/, "")
          .replace(/^\)\]\}',?\s*/, "")
          .trim();
      }

      function findBracketEnd(text, start, openChar, closeChar) {
        let depth = 0;
        let inStr = false;
        let strChar = "";
        let escaped = false;
        for (let i = start; i < text.length; i += 1) {
          const ch = text[i];
          if (inStr) {
            if (escaped) {
              escaped = false;
              continue;
            }
            if (ch === "\\") {
              escaped = true;
              continue;
            }
            if (ch === strChar) {
              inStr = false;
              strChar = "";
            }
            continue;
          }
          if (ch === "\"" || ch === "'") {
            inStr = true;
            strChar = ch;
            continue;
          }
          if (ch === openChar) {
            depth += 1;
          } else if (ch === closeChar) {
            depth -= 1;
            if (depth === 0) {
              return i;
            }
          }
        }
        return -1;
      }

      function tryParseJson(text) {
        try {
          const parsed = JSON.parse(sanitizeJsonText(text));
          if (typeof parsed === "string") {
            return JSON.parse(sanitizeJsonText(parsed));
          }
          return parsed;
        } catch (err) {
          return null;
        }
      }

      function extractFirstJsonObject(text) {
        const start = text.indexOf("{");
        if (start < 0) {
          return null;
        }
        const end = findBracketEnd(text, start, "{", "}");
        if (end < 0) {
          return null;
        }
        return tryParseJson(text.slice(start, end + 1));
      }

      function extractFirstJsonArray(text) {
        const start = text.indexOf("[");
        if (start < 0) {
          return null;
        }
        const end = findBracketEnd(text, start, "[", "]");
        if (end < 0) {
          return null;
        }
        return tryParseJson(text.slice(start, end + 1));
      }
      function extractModelDataPair(text) {
        const src = String(text || "");
        const modelKeyIdx = src.indexOf("\"model\"");
        if (modelKeyIdx < 0) {
          return null;
        }
        const modelColon = src.indexOf(":", modelKeyIdx);
        if (modelColon < 0) {
          return null;
        }
        const modelStart = src.indexOf("{", modelColon);
        if (modelStart < 0) {
          return null;
        }
        const modelEnd = findBracketEnd(src, modelStart, "{", "}");
        if (modelEnd < 0) {
          return null;
        }

        const modelObj = tryParseJson(src.slice(modelStart, modelEnd + 1));
        if (!modelObj || typeof modelObj !== "object") {
          return null;
        }

        const dataTokenRegex = /\"data\"\s*:\s*\[/g;
        dataTokenRegex.lastIndex = modelEnd;
        const dataMatch = dataTokenRegex.exec(src);
        if (!dataMatch) {
          return null;
        }

        const dataStart = src.indexOf("[", dataMatch.index);
        if (dataStart < 0) {
          return null;
        }
        const dataEnd = findBracketEnd(src, dataStart, "[", "]");
        if (dataEnd < 0) {
          return null;
        }

        const dataArr = tryParseJson(src.slice(dataStart, dataEnd + 1));
        if (!Array.isArray(dataArr)) {
          return null;
        }

        return { model: modelObj, data: dataArr };
      }

      function parseInitPropsHtml(htmlText) {
        const marker = /(var|let|const)\s+initProps\s*=/;
        const m = marker.exec(htmlText || "");
        if (!m) {
          return null;
        }
        const eq = htmlText.indexOf("=", m.index);
        const start = htmlText.indexOf("[", eq);
        if (start < 0) {
          return null;
        }
        const end = findBracketEnd(htmlText, start, "[", "]");
        if (end < 0) {
          return null;
        }
        const arr = tryParseJson(htmlText.slice(start, end + 1));
        if (Array.isArray(arr)) {
          return arr[0] || null;
        }
        return arr || null;
      }

      function parsePayload(rawText, contentType) {
        const safe = sanitizeJsonText(rawText);

        const direct = tryParseJson(safe);
        if (direct) {
          return Array.isArray(direct) ? direct[0] : direct;
        }

        const trimmed = String(safe || "").trim();
        const lParen = trimmed.indexOf("(");
        const rParen = trimmed.lastIndexOf(")");
        if (lParen >= 0 && rParen > lParen) {
          const inner = trimmed.slice(lParen + 1, rParen).trim();
          const callback = tryParseJson(inner) || extractFirstJsonObject(inner) || extractFirstJsonArray(inner);
          if (callback) {
            return Array.isArray(callback) ? callback[0] : callback;
          }
        }

        const modelData = extractModelDataPair(rawText);
        if (modelData) {
          return modelData;
        }

        const isHtml = /<html[\s>]/i.test(rawText || "") || (contentType || "").includes("text/html");
        if (isHtml) {
          const fromInitProps = parseInitPropsHtml(rawText);
          if (fromInitProps) {
            return fromInitProps;
          }
        }

        return extractFirstJsonObject(rawText) || extractFirstJsonArray(rawText) || null;
      }

      function findGridElement(node) {
        if (!node) {
          return null;
        }
        if (Array.isArray(node)) {
          for (let i = 0; i < node.length; i += 1) {
            const hit = findGridElement(node[i]);
            if (hit) {
              return hit;
            }
          }
          return null;
        }
        if (typeof node === "object") {
          if (node.model && Array.isArray(node.data)) {
            return { model: node.model, data: node.data };
          }
          if (node.model && node.data && Array.isArray(node.data.items)) {
            return { model: node.model, data: node.data.items };
          }
          if (Array.isArray(node.fields) && Array.isArray(node.data)) {
            return { model: { fields: node.fields }, data: node.data };
          }
          if (node.model && Array.isArray(node.rows)) {
            return { model: node.model, data: node.rows };
          }

          const keys = Object.keys(node);
          for (let i = 0; i < keys.length; i += 1) {
            const hit = findGridElement(node[keys[i]]);
            if (hit) {
              return hit;
            }
          }
        }
        return null;
      }

      function fieldNameByLabel(fields, keyword, fallback) {
        const f = (fields || []).find((it) => it && it.label && String(it.label).indexOf(keyword) >= 0);
        return (f && f.name) || fallback || "";
      }

      function normalizeOrg(payload) {
        const roots = [payload, payload && payload.result, payload && payload.data, payload && payload.response, payload && payload.page, payload && payload.body];
        let grid = null;
        for (let i = 0; i < roots.length; i += 1) {
          grid = findGridElement(roots[i]);
          if (grid) {
            break;
          }
        }
        if (!grid) {
          throw new Error("机构接口未找到 grid 结构");
        }

        const rows = Array.isArray(grid.data) ? grid.data : [];
        state.orgRows = rows.map((item, idx) => ({
          id: String(item.ID || idx + 1),
          name: readValue(item.F1),
          total: toNumber(readValue(item.F2)),
          done: toNumber(readValue(item.F3)),
          progress: toNumber(readValue(item.F4)),
          follow: toNumber(readValue(item.F5)),
          rate: toNumber(readValue(item.F6)),
          overdue: toNumber(readValue(item.F9))
        }));
      }

      function normalizeOwner(payload) {
        const roots = [payload, payload && payload.result, payload && payload.data, payload && payload.response, payload && payload.page, payload && payload.body];
        let grid = null;
        for (let i = 0; i < roots.length; i += 1) {
          grid = findGridElement(roots[i]);
          if (grid) {
            break;
          }
        }
        if (!grid) {
          throw new Error("负责人接口未找到 grid 结构");
        }

        const fields = Array.isArray(grid.model && grid.model.fields) ? grid.model.fields : [];
        const rows = Array.isArray(grid.data) ? grid.data : [];

        const nameKey = fieldNameByLabel(fields, "负责人", "F1");
        const totalKey = fieldNameByLabel(fields, "展业总数", "F2");
        const doneKey = fieldNameByLabel(fields, "已完成", "F3");
        const progressKey = fieldNameByLabel(fields, "推进中", "F4");
        const followKey = fieldNameByLabel(fields, "跟进中", "F5");
        const rateKey = fieldNameByLabel(fields, "完成率", "F8");
        const overdueKey = fieldNameByLabel(fields, "超7天未跟进", "F10");

        state.ownerRows = rows.map((item, idx) => ({
          id: String(item.ID || idx + 1),
          name: readValue(item[nameKey || "F1"]),
          total: toNumber(readValue(item[totalKey || "F2"])),
          done: toNumber(readValue(item[doneKey || "F3"])),
          progress: toNumber(readValue(item[progressKey || "F4"])),
          follow: toNumber(readValue(item[followKey || "F5"])),
          rate: toNumber(readValue(item[rateKey || "F8"])),
          overdue: toNumber(readValue(item[overdueKey || "F10"]))
        }));
      }

      function buildRequestUrl(table) {
        return window.PageApi.buildUIProcessorUrl(
          {
            Table: table,
            P1: el.startDate.value,
            P3: el.endDate.value,
            ParamAction: "true"
          },
          API_ENDPOINT
        );
      }

      async function fetchOne(table) {
        const url = buildRequestUrl(table);
        const resp = await window.PageApi.requestText(url, { timeoutMs: 20000 });
        const payload = parsePayload(resp.text, resp.contentType);
        if (!payload) {
          throw new Error(table + " 接口解析失败");
        }
        return payload;
      }

      function riskScore(item) {
        return item.overdue * 3 + item.follow * 2 + item.progress;
      }

      function riskLevel(item) {
        if (item.overdue > 0) {
          return "high";
        }
        if (item.follow > item.done) {
          return "mid";
        }
        return "low";
      }

      function riskText(level) {
        if (level === "high") {
          return "高风险";
        }
        if (level === "mid") {
          return "中风险";
        }
        return "低风险";
      }

      function buildKpi() {
        const total = state.orgRows.reduce((s, x) => s + x.total, 0);
        const done = state.orgRows.reduce((s, x) => s + x.done, 0);
        const overdue = state.orgRows.reduce((s, x) => s + x.overdue, 0);
        const rate = total > 0 ? done / total : 0;

        return { total, done, rate, overdue };
      }

      function buildSummary(kpi, ranking) {
        const highList = ranking.filter((x) => x.level === "high");
        const midList = ranking.filter((x) => x.level === "mid");
        if (highList.length > 0) {
          const topNames = highList.slice(0, 3).map((x) => x.name).join("、");
          return "当前完成率" + fmtPct(kpi.rate) + "，存在" + highList.length + "个高风险对象，建议立即督办：" + topNames + "。";
        }
        if (midList.length > 0) {
          const topNames = midList.slice(0, 3).map((x) => x.name).join("、");
          return "当前完成率" + fmtPct(kpi.rate) + "，暂无高风险，" + midList.length + "个中风险对象需重点跟进：" + topNames + "。";
        }
        return "当前完成率" + fmtPct(kpi.rate) + "，暂无超期风险，整体可控。";
      }

      function buildRanking() {
        const merged = state.orgRows
          .map((x) => ({ ...x, type: "机构" }))
          .concat(state.ownerRows.map((x) => ({ ...x, type: "负责人" })));

        return merged
          .map((item) => {
            const score = riskScore(item);
            const level = riskLevel(item);
            return { ...item, score, level };
          })
          .sort((a, b) => {
            if (b.score !== a.score) {
              return b.score - a.score;
            }
            return b.total - a.total;
          })
          .slice(0, TOP_N);
      }

      function renderKpi(kpi) {
        const cards = [
          { label: "展业总数", value: fmtNum(kpi.total) },
          { label: "已完成", value: fmtNum(kpi.done) },
          { label: "完成率", value: fmtPct(kpi.rate) },
          { label: "超7天未跟进", value: fmtNum(kpi.overdue) }
        ];

        el.kpiGrid.innerHTML = cards
          .map((it) => (
            "<div class=\"kpi-card\">" +
            "<div class=\"kpi-label\">" + esc(it.label) + "</div>" +
            "<div class=\"kpi-value\">" + esc(it.value) + "</div>" +
            "</div>"
          ))
          .join("");
      }

      function renderRanking(ranking) {
        if (!ranking.length) {
          el.rankList.innerHTML = "<div class=\"empty\">暂无风险对象</div>";
          return;
        }

        const maxScore = Math.max(1, ...ranking.map((x) => x.score));
        el.rankList.innerHTML = ranking
          .map((it, idx) => {
            const levelText = riskText(it.level);
            const barPct = Math.max(2, Math.min(100, (it.score / maxScore) * 100));
            const rankCls = idx === 0 ? "top1" : idx === 1 ? "top2" : idx === 2 ? "top3" : "";
            const insight = it.overdue > 0
              ? "超期 " + fmtNum(it.overdue)
              : "完成率 " + fmtPct(it.rate);
            return (
              "<div class=\"rank-item\" title=\"已完成:" + esc(fmtNum(it.done)) + " | 推进中:" + esc(fmtNum(it.progress)) + " | 跟进中:" + esc(fmtNum(it.follow)) + " | 超期:" + esc(fmtNum(it.overdue)) + "\">" +
              "<div class=\"rank-left\">" +
              "<span class=\"rank-no " + rankCls + "\">" + (idx + 1) + "</span>" +
              "<div>" +
              "<div class=\"rank-name\">" + esc(it.name || "-") + "</div>" +
              "<div class=\"rank-sub\">" + esc(it.type) + " | " + esc(insight) + "</div>" +
              "</div>" +
              "</div>" +
              "<div class=\"rank-track\"><div class=\"rank-fill " + it.level + "\" style=\"width:" + barPct.toFixed(2) + "%\"></div></div>" +
              "<div class=\"rank-right\">" +
              "<span class=\"rank-pct\">" + barPct.toFixed(0) + "%</span>" +
              "<span class=\"risk-tag " + it.level + "\">" + levelText + "</span>" +
              "</div>" +
              "</div>"
            );
          })
          .join("");
      }

      function renderAll() {
        const kpi = buildKpi();
        const ranking = buildRanking();
        renderKpi(kpi);
        renderRanking(ranking);
        el.summaryText.textContent = buildSummary(kpi, ranking);
      }

      async function runQuery() {
        if (!window.PageApi) {
          setStatus("缺少 common/api.js，无法请求接口", true);
          return;
        }
        if (state.loading) {
          return;
        }

        state.loading = true;
        el.btnSearch.disabled = true;
        el.btnRefresh.disabled = true;
        setStatus("正在加载领导看板数据...");

        try {
          const [orgPayload, ownerPayload] = await Promise.all([
            fetchOne("XN_FZJG"),
            fetchOne("XN_FZRY")
          ]);
          normalizeOrg(orgPayload);
          normalizeOwner(ownerPayload);
          renderAll();
          setStatus("加载成功：机构 " + state.orgRows.length + " 条，负责人 " + state.ownerRows.length + " 条");
        } catch (err) {
          console.error("[领导看板] 请求失败", err);
          state.orgRows = [];
          state.ownerRows = [];
          renderAll();
          el.summaryText.textContent = "当前无可用数据，请检查接口或代理配置。";
          setStatus("加载失败，请检查代理路径与接口返回格式", true);
        } finally {
          state.loading = false;
          el.btnSearch.disabled = false;
          el.btnRefresh.disabled = false;
        }
      }

      function resetDates() {
        const t = todayText();
        el.startDate.value = t;
        el.endDate.value = t;
      }

      el.btnSearch.addEventListener("click", runQuery);
      el.btnRefresh.addEventListener("click", runQuery);
      el.btnReset.addEventListener("click", function () {
        resetDates();
        runQuery();
      });

      resetDates();
      runQuery();
    })();
  </script>
</body>
</html>
