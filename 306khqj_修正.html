<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高净值客户管理总览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f9ff 0%, #e6f3ff 50%, #dbefff 100%);
            min-height: 100vh;
            padding: 30px 24px;
            position: relative;
            letter-spacing: 0.3px;
        }

        .bg-flow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.5;
            background:
                radial-gradient(circle at 10% 20%, rgba(102, 178, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(145, 212, 250, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(192, 230, 255, 0.08) 0%, transparent 50%);
            animation: bgFlow 25s ease-in-out infinite;
        }

        @keyframes bgFlow {
            0%, 100% { background-position: 0% 0%, 100% 100%, 50% 50%; }
            50% { background-position: 100% 100%, 0% 0%, 50% 50%; }
        }

        .page-wrapper {
            max-width: 1600px;
            margin: 0 auto;
        }

        .main-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .main-title {
            display: inline-block;
            padding: 16px 72px;
            font-size: 2rem;
            font-weight: 700;
            color: #1a4d7a;
            text-shadow: 0 2px 10px rgba(51, 126, 204, 0.2);
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.95) 0%,
                rgba(242, 248, 255, 0.92) 50%,
                rgba(235, 245, 255, 0.90) 100%);
            border: 2px solid rgba(102, 178, 255, 0.35);
            border-radius: 12px;
            box-shadow:
                0 4px 20px rgba(102, 178, 255, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        .main-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: -200%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent 0%,
                transparent 30%,
                rgba(102, 178, 255, 0.2) 45%,
                rgba(145, 212, 250, 0.3) 50%,
                rgba(102, 178, 255, 0.2) 55%,
                transparent 70%,
                transparent 100%);
            animation: titleFlow 6s ease-in-out infinite;
        }

        @keyframes titleFlow {
            0% { left: -200%; }
            100% { left: 200%; }
        }

        /* 去除标题动画以提升精致感 */
        .main-title::before {
            display: none;
        }

        /* 顶部统计卡片 */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(180deg, rgba(102, 178, 255, 0.03) 0%, rgba(255,255,255, 0.88) 100%);
            border: 1px solid rgba(102, 178, 255, 0.25);
            border-radius: 12px;
            padding: 22px 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(102, 178, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, rgba(102, 178, 255, 0.8) 0%, rgba(102, 178, 255, 0.3) 100%);
            box-shadow: 0 0 12px rgba(102, 178, 255, 0.5), 0 0 24px rgba(102, 178, 255, 0.3);
            z-index: 1;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 178, 255, 0.15);
            border-color: rgba(102, 178, 255, 0.45);
        }

        .stat-card.total-customers {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.15) 0%, rgba(235, 250, 255, 0.92) 100%);
            border: 1px solid rgba(59, 130, 246, 0.35);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.12);
        }

        .stat-card.total-customers::before {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.9) 0%, rgba(59, 130, 246, 0.2) 100%);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6), 0 0 24px rgba(59, 130, 246, 0.4);
        }

        .stat-card.total-assets {
            background: linear-gradient(180deg, rgba(79, 141, 211, 0.15) 0%, rgba(239, 247, 255, 0.92) 100%);
            border: 1px solid rgba(79, 141, 211, 0.35);
            box-shadow: 0 4px 20px rgba(79, 141, 211, 0.12);
        }

        .stat-card.total-assets::before {
            background: linear-gradient(90deg, rgba(79, 141, 211, 0.9) 0%, rgba(79, 141, 211, 0.2) 100%);
            box-shadow: 0 0 12px rgba(79, 141, 211, 0.6), 0 0 24px rgba(79, 141, 211, 0.4);
        }

        .stat-card.today-trade {
            background: linear-gradient(180deg, rgba(90, 169, 255, 0.14) 0%, rgba(241, 248, 255, 0.92) 100%);
            border: 1px solid rgba(90, 169, 255, 0.35);
            box-shadow: 0 4px 20px rgba(90, 169, 255, 0.12);
        }

        .stat-card.today-trade::before {
            background: linear-gradient(90deg, rgba(90, 169, 255, 0.9) 0%, rgba(90, 169, 255, 0.2) 100%);
            box-shadow: 0 0 12px rgba(90, 169, 255, 0.6), 0 0 24px rgba(90, 169, 255, 0.4);
        }

        .stat-card.today-profit {
            background: linear-gradient(180deg, rgba(30, 99, 182, 0.14) 0%, rgba(236, 246, 255, 0.92) 100%);
            border: 1px solid rgba(30, 99, 182, 0.35);
            box-shadow: 0 4px 20px rgba(30, 99, 182, 0.12);
        }

        .stat-card.today-profit::before {
            background: linear-gradient(90deg, rgba(30, 99, 182, 0.9) 0%, rgba(30, 99, 182, 0.2) 100%);
            box-shadow: 0 0 12px rgba(30, 99, 182, 0.6), 0 0 24px rgba(30, 99, 182, 0.4);
        }

        .stat-card.total-customers:hover {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.2) 0%, rgba(240, 252, 255, 0.95) 100%);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.18);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .stat-card.total-assets:hover {
            background: linear-gradient(180deg, rgba(79, 141, 211, 0.2) 0%, rgba(244, 250, 255, 0.95) 100%);
            box-shadow: 0 8px 30px rgba(79, 141, 211, 0.18);
            border-color: rgba(79, 141, 211, 0.5);
        }

        .stat-card.today-trade:hover {
            background: linear-gradient(180deg, rgba(90, 169, 255, 0.2) 0%, rgba(245, 250, 255, 0.95) 100%);
            box-shadow: 0 8px 30px rgba(90, 169, 255, 0.18);
            border-color: rgba(90, 169, 255, 0.5);
        }

        .stat-card.today-profit:hover {
            background: linear-gradient(180deg, rgba(30, 99, 182, 0.2) 0%, rgba(242, 248, 255, 0.95) 100%);
            box-shadow: 0 8px 30px rgba(30, 99, 182, 0.18);
            border-color: rgba(30, 99, 182, 0.5);
        }

        .stat-label {
            font-size: 0.85rem;
            color: #5a7a9a;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: #2a4a6a;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .stat-trend {
            font-size: 0.8rem;
            color: #5a7a9a;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .stat-trend.up {
            color: #ef5350;
        }

        .stat-trend.down {
            color: #43a047;
        }

        .stat-trend.down {
            color: #43a047;
        }

        /* 客户列表区域 */
        .content-section {
            background: linear-gradient(180deg, rgba(102, 178, 255, 0.03) 0%, rgba(255,255,255, 0.88) 100%);
            border: 1px solid rgba(102, 178, 255, 0.25);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(102, 178, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2a5a8a;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 20px;
            background: linear-gradient(180deg,
                #66b3ff 0%,
                #91d4fa 40%,
                #2f80ed 100%);
            border-radius: 2.5px;
            box-shadow: 0 0 10px rgba(102, 179, 255, 0.6),
                        0 0 20px rgba(47, 128, 237, 0.32);
        }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            padding: 10px 16px;
            border: 1px solid rgba(102, 178, 255, 0.25);
            border-radius: 6px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.95);
            color: #2a4a6a;
            width: 250px;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .search-input:focus {
            outline: none;
            border-color: #66b3ff;
            box-shadow: 0 0 10px rgba(102, 178, 255, 0.15);
        }

        .search-btn {
            padding: 10px 20px;
            background: rgba(102, 178, 255, 0.1);
            border: 1px solid rgba(102, 178, 255, 0.3);
            border-radius: 6px;
            color: #3385d6;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .search-btn:hover {
            background: rgba(102, 178, 255, 0.25);
            border-color: rgba(102, 178, 255, 0.6);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(102, 178, 255, 0.15);
        }

        .export-btn {
            padding: 10px 20px;
            background: rgba(102, 178, 255, 0.1);
            border: 1px solid rgba(102, 178, 255, 0.3);
            border-radius: 6px;
            color: #3385d6;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .export-btn:hover {
            background: rgba(102, 178, 255, 0.25);
            border-color: rgba(102, 178, 255, 0.6);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(102, 178, 255, 0.15);
        }

        .export-btn .icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        /* 客户卡片网格 */
        /* 客户表格样式 */
        .customer-table-container {
            overflow-x: auto;
            background: linear-gradient(180deg, rgba(102, 178, 255, 0.03) 0%, rgba(255,255,255, 0.88) 100%);
            border: 1px solid rgba(102, 178, 255, 0.25);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(102, 178, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .customer-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        .customer-table th {
            background: linear-gradient(135deg,
                rgba(102, 178, 255, 0.15) 0%,
                rgba(145, 212, 250, 0.12) 100%);
            color: #2a5a8a;
            font-weight: 600;
            padding: 14px 14px;
            text-align: left;
            border-bottom: 2px solid rgba(102, 178, 255, 0.35);
            white-space: nowrap;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .customer-table td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(102, 178, 255, 0.1);
            color: #2a4a6a;
            vertical-align: middle;
            font-size: 0.9rem;
        }

        .customer-table tbody tr {
            cursor: pointer;
        }

        .customer-table tbody tr:nth-child(even) {
            background: rgba(242, 248, 255, 0.5);
        }

        .customer-table tbody tr:nth-child(odd) {
            background: rgba(255, 255, 255, 0.6);
        }

        .customer-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #2a4a6a;
        }

        .customer-id {
            font-size: 0.78rem;
            color: #5a7a9a;
            background: rgba(242, 248, 255, 0.6);
            border: 1px solid rgba(102, 178, 255, 0.15);
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
            margin-right: 6px;
            letter-spacing: 0.2px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .tag.primary {
            background: rgba(102, 178, 255, 0.15);
            color: #3385d6;
            border: 1px solid rgba(102, 178, 255, 0.3);
        }

        .tag.success {
            background: rgba(76, 175, 80, 0.15);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .tag.warning {
            background: rgba(47, 128, 237, 0.14);
            color: #2f80ed;
            border: 1px solid rgba(47, 128, 237, 0.28);
        }

        .tag.danger {
            background: rgba(30, 99, 182, 0.14);
            color: #1e63b6;
            border: 1px solid rgba(30, 99, 182, 0.28);
        }

        .metric-value {
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .metric-value.profit {
            color: #e53935;
        }

        .metric-value.loss {
            color: #43a047;
        }

        .last-active {
            font-size: 0.82rem;
            color: #8aabc4;
            letter-spacing: 0.2px;
        }

        .view-detail-btn {
            padding: 6px 14px;
            background: linear-gradient(135deg,
                rgba(102, 179, 255, 0.92) 0%,
                rgba(51, 133, 214, 0.88) 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 1px 3px rgba(102, 178, 255, 0.15);
        }

        .view-detail-btn:hover {
            background: linear-gradient(135deg,
                rgba(102, 179, 255, 0.98) 0%,
                rgba(51, 133, 214, 0.94) 100%);
            box-shadow: 0 2px 5px rgba(102, 178, 255, 0.2);
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 0 20px;
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pagination-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rows-per-page {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2a4a6a;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .rows-select {
            padding: 8px 12px;
            border: 1px solid rgba(102, 178, 255, 0.25);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.95);
            color: #2a4a6a;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.2px;
        }

        .rows-select:hover,
        .rows-select:focus {
            outline: none;
            border-color: #66b3ff;
            background: rgba(242, 248, 255, 0.85);
            box-shadow: 0 2px 8px rgba(102, 178, 255, 0.15);
        }

        .page-info {
            color: #5a7a9a;
            font-size: 0.85rem;
            letter-spacing: 0.2px;
        }

        .page-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.93);
            border: 1px solid rgba(102, 178, 255, 0.25);
            border-radius: 6px;
            color: #2a4a6a;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 48px;
            letter-spacing: 0.2px;
        }

        .page-btn:hover:not(:disabled) {
            background: rgba(102, 178, 255, 0.25);
            border-color: rgba(102, 178, 255, 0.6);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(102, 178, 255, 0.15);
        }

        .page-btn.active {
            background: rgba(102, 178, 255, 0.25);
            border-color: rgba(102, 178, 255, 0.6);
            box-shadow: 0 2px 8px rgba(102, 178, 255, 0.15);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(242, 248, 255, 0.6);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }

            .customer-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .stats-overview {
                grid-template-columns: 1fr;
            }

            .customer-grid {
                grid-template-columns: 1fr;
            }

            .search-box {
                flex-direction: column;
                width: 100%;
            }

            .search-input {
                width: 100%;
            }
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #5a7a9a;
            font-size: 1.1rem;
        }

        .loading::after {
            content: '...';
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
    <style>
        :root {
            --page-bg: #eef3f8;
            --surface: #ffffff;
            --surface-soft: #f7f9fc;
            --line: #d9e2ec;
            --line-strong: #b9c7d8;
            --text: #172033;
            --muted: #687589;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-soft: #e8f0ff;
            --gold: #2f80ed;
            --violet: #4f8dd3;
            --cyan: #2f9bd6;
            --red: #dc2626;
            --green: #16a34a;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 12px 30px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 22px 55px rgba(15, 23, 42, 0.12);
        }

        * {
            letter-spacing: 0;
        }

        body {
            color: var(--text);
            background: linear-gradient(135deg, #f5f9ff 0%, #e6f3ff 50%, #dbefff 100%);
            padding: 28px 15px;
            line-height: 1.55;
        }

        .bg-flow {
            opacity: 0.5;
            background:
                radial-gradient(circle at 10% 20%, rgba(102, 178, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(145, 212, 250, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(192, 230, 255, 0.08) 0%, transparent 50%);
            animation: bgFlow 25s ease-in-out infinite;
        }

        .page-wrapper {
            max-width: 1400px;
        }

        .main-header {
            text-align: center;
            margin-bottom: 22px;
        }

        .main-title {
            display: inline-block;
            width: fit-content;
            max-width: 100%;
            padding: 0;
            color: var(--text);
            background: transparent;
            border: 0;
            border-radius: 0;
            box-shadow: none;
            text-shadow: none;
            font-size: clamp(1.7rem, 2.2vw, 2.45rem);
            font-weight: 750;
            line-height: 1.2;
        }

        .main-title::after {
            content: '';
            display: block;
            width: 72px;
            height: 4px;
            margin: 14px auto 0;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--primary), var(--gold));
        }

        .stats-overview {
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 18px;
        }

        .stat-card,
        .content-section,
        .customer-table-container {
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(217, 226, 236, 0.95);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .stat-card {
            min-height: 142px;
            padding: 22px;
            text-align: left;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .stat-card::before {
            top: 18px;
            left: 18px;
            right: auto;
            width: 38px;
            height: 4px;
            border-radius: 999px;
            background: var(--primary);
            box-shadow: none;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--line-strong);
            box-shadow: var(--shadow-lg);
        }

        .stat-card.total-customers,
        .stat-card.total-assets,
        .stat-card.today-trade,
        .stat-card.today-profit,
        .stat-card.total-customers:hover,
        .stat-card.total-assets:hover,
        .stat-card.today-trade:hover,
        .stat-card.today-profit:hover {
            background: linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
            border-color: rgba(217, 226, 236, 0.95);
            box-shadow: var(--shadow-md);
        }

        .stat-card.total-customers::before { background: var(--primary); }
        .stat-card.total-assets::before { background: var(--gold); }
        .stat-card.today-trade::before { background: var(--violet); }
        .stat-card.today-profit::before { background: var(--cyan); }

        .stat-label {
            margin: 18px 0 8px;
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 650;
        }

        .stat-value {
            color: var(--text);
            font-size: clamp(1.65rem, 2vw, 2.25rem);
            font-weight: 760;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        .stat-trend {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .stat-trend.up,
        .metric-value.profit {
            color: var(--red);
        }

        .stat-trend.down,
        .metric-value.loss {
            color: var(--green);
        }

        .content-section {
            padding: 22px;
        }

        .section-header {
            gap: 16px;
            margin-bottom: 18px;
        }

        .section-title {
            color: var(--text);
            font-size: 1.15rem;
            font-weight: 750;
        }

        .section-title::before {
            width: 4px;
            height: 18px;
            background: var(--primary);
            box-shadow: none;
        }

        .search-box {
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input,
        .filter-select,
        .filter-date,
        .rows-select {
            height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        .search-input {
            width: min(320px, 36vw);
            padding: 0 14px;
        }

        .filter-select,
        .filter-date {
            min-width: 160px;
            padding: 0 12px;
            font: inherit;
        }

        .filter-date {
            min-width: 148px;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-input:focus,
        .filter-select:focus,
        .filter-date:focus,
        .rows-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
            outline: none;
        }

        .search-btn,
        .export-btn,
        .refresh-btn,
        .view-detail-btn,
        .page-btn {
            border-radius: 8px;
            font-weight: 650;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, border-color 0.16s ease;
        }

        .search-btn,
        .view-detail-btn {
            color: #ffffff;
            border: 1px solid var(--primary);
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
        }

        .export-btn,
        .refresh-btn,
        .page-btn {
            color: #27405f;
            border: 1px solid var(--line);
            background: #ffffff;
            box-shadow: var(--shadow-sm);
        }

        .search-btn,
        .export-btn,
        .refresh-btn {
            height: 40px;
            padding: 0 18px;
        }

        .search-btn:hover,
        .export-btn:hover,
        .refresh-btn:hover,
        .view-detail-btn:hover,
        .page-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .export-btn:hover,
        .refresh-btn:hover,
        .page-btn:hover:not(:disabled) {
            color: var(--primary-dark);
            border-color: #adc4ef;
            background: var(--primary-soft);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .customer-table-container {
            overflow: auto;
        }

        .data-note {
            margin-top: 14px;
            color: #8a97a8;
            font-size: 0.78rem;
            line-height: 1.6;
            text-align: right;
        }

        .customer-table {
            min-width: 1180px;
            border-collapse: separate;
            border-spacing: 0;
        }

        .customer-table th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #f3f6fa;
            color: #475569;
            border-bottom: 1px solid var(--line);
            padding: 13px 16px;
            font-size: 0.82rem;
            font-weight: 750;
        }

        .customer-table td {
            padding: 14px 16px;
            color: #243044;
            border-bottom: 1px solid #edf1f6;
            font-size: 0.9rem;
        }

        .customer-table tbody tr:nth-child(even),
        .customer-table tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        .customer-table tbody tr:hover {
            background: #f7fbff;
        }

        .customer-name,
        .metric-value {
            color: var(--text);
            font-weight: 720;
            font-variant-numeric: tabular-nums;
        }

        .customer-id,
        .tag {
            border-radius: 999px;
            box-shadow: none;
            white-space: nowrap;
        }

        .customer-id {
            color: #52657a;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }

        .customer-id-link {
            display: inline-block;
            text-decoration: none;
            color: #2b6cb0;
            transition: all 0.25s ease;
        }

        .customer-id-link:hover {
            color: #1d4f8c;
            background: rgba(102, 178, 255, 0.18);
            border-color: rgba(102, 178, 255, 0.35);
            box-shadow: 0 4px 12px rgba(102, 178, 255, 0.16);
            transform: translateY(-1px);
        }

        .tag {
            padding: 4px 10px;
            font-size: 0.74rem;
            font-weight: 700;
        }

        .tag.primary {
            color: #1d4ed8;
            background: #e8f0ff;
            border-color: #bfd3ff;
        }

        .tag.success {
            color: #15803d;
            background: #eaf7ef;
            border-color: #bde5ca;
        }

        .tag.warning {
            color: #2f80ed;
            background: #edf6ff;
            border-color: #bfdcff;
        }

        .tag.danger {
            color: #1e63b6;
            background: #eaf2ff;
            border-color: #c7daf7;
        }

        .last-active {
            color: var(--muted);
        }

        .view-detail-btn {
            min-width: 68px;
            padding: 7px 12px;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.18);
        }

        .pagination {
            gap: 16px;
            margin-top: 20px;
            padding: 0;
        }

        .pagination-left,
        .pagination-controls,
        #pageNumbers {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .rows-per-page,
        .page-info {
            color: var(--muted);
            font-size: 0.86rem;
        }

        .rows-select {
            padding: 0 28px 0 10px;
        }

        .page-btn {
            min-width: 40px;
            height: 36px;
            padding: 0 12px;
        }

        .page-btn.active {
            color: #ffffff;
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
        }

        .page-btn:disabled {
            color: #9aa7b7;
            opacity: 1;
            background: #f4f7fb;
            border-color: #e5ebf2;
            box-shadow: none;
        }

        .loading {
            color: var(--muted);
            background: #ffffff;
        }

        @media (max-width: 1100px) {
            body {
                padding: 22px 15px;
            }

            .stats-overview {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .section-header,
            .pagination {
                align-items: stretch;
                flex-direction: column;
            }

            .search-box {
                justify-content: flex-start;
            }

            .search-input,
            .filter-select,
            .filter-date {
                width: min(420px, 100%);
            }
        }

        @media (max-width: 720px) {
            body {
                padding: 16px 15px;
            }

            .main-header {
                margin-bottom: 18px;
            }

            .stats-overview {
                grid-template-columns: 1fr;
            }

            .content-section {
                padding: 16px;
            }

            .search-box {
                display: grid;
                grid-template-columns: 1fr 86px 86px;
                width: 100%;
            }

            .search-input {
                grid-column: 1 / -1;
                width: 100%;
            }

            .filter-select,
            .filter-date {
                grid-column: 1 / -1;
                width: 100%;
            }

            .search-btn,
            .export-btn,
            .refresh-btn {
                width: 100%;
                padding: 0 10px;
            }

            .pagination-left,
            .pagination-controls,
            #pageNumbers {
                width: 100%;
            }

            .page-btn {
                flex: 1 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="bg-flow"></div>

    <div class="page-wrapper">
        <header class="main-header">
            <h1 class="main-title">两融客户管理总览</h1>
        </header>

        <!-- 顶部统计卡片 -->
        <div class="stats-overview">
            <div class="stat-card total-customers">
                <div class="stat-label">客户总数</div>
                <div class="stat-value" id="totalCustomers">156</div>
                <div class="stat-trend up">↑ 较上月 +12 人</div>
            </div>
            <div class="stat-card total-assets">
                <div class="stat-label">总资产(亿元)</div>
                <div class="stat-value" id="totalAssets">1.26</div>
                <div class="stat-trend up">↑ 较上月 +5.8%</div>
            </div>
            <div class="stat-card today-trade">
                <div class="stat-label">交易额(亿元)</div>
                <div class="stat-value" id="todayTrade">0.33</div>
                <div class="stat-trend up">↑ 较昨日 +18.2%</div>
            </div>
            <div class="stat-card today-profit">
                <div class="stat-label">盈亏(亿元)</div>
                <div class="stat-value" id="todayProfit" style="color: #e53935;">+0.02</div>
                <div class="stat-trend up">↑ 较昨日 +23.5%</div>
            </div>
        </div>

        <!-- 客户列表区域 -->
        <div class="content-section">
            <div class="section-header">
                <h2 class="section-title">客户列表</h2>
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索客户姓名或ID...">
                    <select class="filter-select" id="branchFilter" onchange="applyFilters()">
                        <option value="">全部营业部</option>
                    </select>
                    <input type="date" class="filter-date" id="tradeDateFilter" onchange="applyFilters()">
                    <button class="search-btn" onclick="searchCustomers()">搜索</button>
                    <button class="refresh-btn" onclick="refreshCurrentData()">刷新</button>
                    <button class="export-btn" onclick="exportToExcel()">导出</button>
                </div>
            </div>

            <div class="customer-table-container">
                <table class="customer-table">
                    <thead>
                        <tr>
                            <th>客户姓名</th>
                            <th>客户号</th>
                            <th>客户等级</th>
                            <th>风险等级</th>
                            <th>总资产(万元)</th>
                            <th>当日盈亏(万元)</th>
                            <th>收益率</th>
                            <th>营业部</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        <!-- 客户行将通过JS动态生成 -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div class="pagination-left">
                    <span class="rows-per-page">
                        每页显示:
                        <select class="rows-select" id="rowsPerPageSelect" onchange="changeRowsPerPage()">
                            <option value="5">5行</option>
                            <option value="10" selected>10行</option>
                            <option value="20">20行</option>
                            <option value="50">50行</option>
                            <option value="100">100行</option>
                        </select>
                    </span>
                    <span class="page-info" id="pageInfo">显示 1-10 条，共 156 条</span>
                </div>
                <div class="pagination-controls">
                    <button class="page-btn" id="firstPageBtn" onclick="goToFirstPage()">首页</button>
                    <button class="page-btn" id="prevPageBtn" onclick="goToPrevPage()">上一页</button>
                    <span id="pageNumbers"></span>
                    <button class="page-btn" id="nextPageBtn" onclick="goToNextPage()">下一页</button>
                    <button class="page-btn" id="lastPageBtn" onclick="goToLastPage()">末页</button>
                </div>
            </div>
            <div class="data-note" id="dataNote">数据口径：默认展示T-1交易日数据，可按营业部和交易日筛选。</div>
        </div>
    </div>

    <script>
        // ========== 公共配置和工具函数 ==========
        const CONFIG = {
            API_BASE_URL: '/api',              // API基础路径
            AUTO_FALLBACK_TO_MOCK: true,      // API失败时是否自动使用模拟数据
            MOCK_MODE: true,                  // 模拟数据模式开关
        };

        // 分页状态
        let currentPage = 1;
        let rowsPerPage = 10;
        let filteredCustomers = [];
        let selectedBranch = '';
        let selectedTradeDate = '';
        const BRANCH_OPTIONS = ['北京朝阳营业部', '上海浦东营业部', '深圳南山营业部', '广州天河营业部', '杭州西湖营业部'];

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function addDays(dateOrString, days) {
            const date = typeof dateOrString === 'string' ? new Date(`${dateOrString}T00:00:00`) : new Date(dateOrString);
            date.setDate(date.getDate() + days);
            return date;
        }

        function getDefaultTradeDate() {
            return formatDate(addDays(new Date(), -1));
        }

        function syncFilterState() {
            selectedBranch = document.getElementById('branchFilter')?.value || '';
            selectedTradeDate = document.getElementById('tradeDateFilter')?.value || getDefaultTradeDate();
        }

        function updateDataNote() {
            const branchText = selectedBranch || '全部营业部';
            const note = document.getElementById('dataNote');
            if (note) {
                note.textContent = `数据口径：当前展示 ${selectedTradeDate}、${branchText} 的高净值客户管理数据；默认进入页面展示T-1交易日。`;
            }
        }

        // ========== 数据库API查询函数 ==========
        // 从API加载统计数据
        async function fetchStatisticsData(branch = selectedBranch, tradeDate = selectedTradeDate) {
            try {
                const params = new URLSearchParams({
                    branch: branch,
                    tradeDate: tradeDate
                });
                const response = await fetch(`${CONFIG.API_BASE_URL}/dashboard/statistics?${params}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const result = await response.json();
                if (result.success && result.data) {
                    console.log('统计数据加载完成', result);
                    return result.data;
                } else if (CONFIG.AUTO_FALLBACK_TO_MOCK) {
                    console.log('API返回空数据,使用模拟统计数据');
                    return getMockStatisticsData(branch, tradeDate);
                }
            } catch (error) {
                console.error('统计数据加载失败,切换到模拟数据', error);
                if (CONFIG.AUTO_FALLBACK_TO_MOCK) {
                    return getMockStatisticsData(branch, tradeDate);
                }
            }
            return null;
        }

        // 从API加载客户列表
        async function fetchCustomerList(page = 1, pageSize = 10, keyword = '', branch = selectedBranch, tradeDate = selectedTradeDate) {
            try {
                const params = new URLSearchParams({
                    page: page,
                    pageSize: pageSize,
                    keyword: keyword,
                    branch: branch,
                    tradeDate: tradeDate
                });
                const response = await fetch(`${CONFIG.API_BASE_URL}/dashboard/customers?${params}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const result = await response.json();
                if (result.success && result.data) {
                    console.log('客户列表加载完成', result);
                    return result.data;
                } else if (CONFIG.AUTO_FALLBACK_TO_MOCK) {
                    console.log('API返回空数据,使用模拟客户列表');
                    return getMockCustomerList(page, pageSize, keyword, branch, tradeDate);
                }
            } catch (error) {
                console.error('客户列表加载失败,切换到模拟数据', error);
                if (CONFIG.AUTO_FALLBACK_TO_MOCK) {
                    return getMockCustomerList(page, pageSize, keyword, branch, tradeDate);
                }
            }
            return null;
        }

        // ========== 模拟数据函数 ==========
        // 模拟统计数据
        function getMockStatisticsData(branch = selectedBranch, tradeDate = selectedTradeDate) {
            const list = getFilteredMockCustomers('', branch, tradeDate);
            const totalAssets = list.reduce((sum, customer) => sum + customer.totalAssets, 0);
            const todayTrade = list.reduce((sum, customer) => sum + customer.todayTrade, 0);
            const todayProfit = list.reduce((sum, customer) => sum + customer.todayProfit, 0);

            return {
                totalCustomers: list.length,
                totalAssets: Math.round(totalAssets * 10) / 10,
                todayTrade: Math.round(todayTrade * 10) / 10,
                todayProfit: Math.round(todayProfit * 10) / 10,
                totalCustomersTrend: 12,
                totalAssetsTrend: 5.8,
                todayTradeTrend: 18.2,
                todayProfitTrend: 23.5
            };
        }

        // 模拟客户列表
        function buildMockCustomers() {
            const names = ['张', '李', '王', '赵', '孙', '周', '吴', '郑', '冯', '陈', '褚', '卫', '蒋', '沈', '韩', '杨'];
            const firstNames = ['三', '四', '五', '六', '七', '八', '九', '十', '伟', '芳', '娜', '敏', '静', '强', '磊', '洋', '勇', '军', '杰', '娟'];
            const levels = ['黄金客户', '白金客户', '钻石客户'];
            const riskLevels = [
                { level: 'C1', tag: '低风险' },
                { level: 'C2', tag: '中低风险' },
                { level: 'C3', tag: '中等风险' },
                { level: 'C4', tag: '中高风险' },
                { level: 'C5', tag: '高风险' }
            ];
            const brokers = ['李四', '赵六', '王八', '刘九', '陈十', '周十一', '吴十二', '郑十三'];
            const customers = [];
            const defaultDate = getDefaultTradeDate();

            for (let i = 1; i <= 156; i++) {
                const name = names[i % names.length] + firstNames[(i * 3) % firstNames.length];
                const level = levels[i % levels.length];
                const risk = riskLevels[i % riskLevels.length];
                const totalAssets = 1000 + ((i * 137) % 20000);
                const baseProfit = ((i * 71) % 500) - 150;
                const profitRate = (baseProfit / totalAssets) * 100;
                const dateOffset = i % 6;
                const tradeDate = formatDate(addDays(defaultDate, -dateOffset));

                customers.push({
                    customerId: `KH202401${String(i).padStart(4, '0')}`,
                    customerName: name,
                    level: level,
                    riskLevel: risk.level,
                    riskTag: risk.tag,
                    totalAssets: totalAssets,
                    todayTrade: Math.round((120 + ((i * 89) % 1800)) * 10) / 10,
                    todayProfit: Math.round(baseProfit * 100) / 100,
                    profitRate: Math.round(profitRate * 100) / 100,
                    tradeDate: tradeDate,
                    lastActive: `${(i * 7) % 60}分钟前`,
                    broker: brokers[i % brokers.length],
                    branch: BRANCH_OPTIONS[i % BRANCH_OPTIONS.length]
                });
            }

            return customers;
        }

        function getFilteredMockCustomers(keyword = '', branch = selectedBranch, tradeDate = selectedTradeDate) {
            return MOCK_CUSTOMERS.filter(customer => {
                const matchesKeyword = !keyword || customer.customerName.includes(keyword) || customer.customerId.includes(keyword);
                const matchesBranch = !branch || customer.branch === branch;
                const matchesTradeDate = !tradeDate || customer.tradeDate === tradeDate;
                return matchesKeyword && matchesBranch && matchesTradeDate;
            });
        }

        function getMockCustomerList(page, pageSize, keyword, branch = selectedBranch, tradeDate = selectedTradeDate) {
            const filtered = getFilteredMockCustomers(keyword, branch, tradeDate);

            if (keyword) {
                return {
                    list: filtered,
                    total: filtered.length,
                    page: page,
                    pageSize: pageSize
                };
            }

            return {
                list: filtered,
                total: filtered.length,
                page: page,
                pageSize: pageSize
            };
        }

        // 初始化模拟数据
        const MOCK_CUSTOMERS = buildMockCustomers();
        filteredCustomers = [];

        // 根据风险等级选择标签样式
        function getRiskTagClass(riskLevel) {
            if (riskLevel === 'C5') return 'danger';
            if (riskLevel === 'C4') return 'warning';
            if (riskLevel === 'C2' || riskLevel === 'C1') return 'success';
            return 'primary';
        }

        // 根据客户等级选择标签样式
        function getLevelTagClass(level) {
            if (level === '钻石客户') return 'danger';
            if (level === '黄金客户') return 'warning';
            return 'primary';
        }

        function getDetailPageUrl(customerId) {
            return `gjzkh-gl-360_修正.html?customerId=${encodeURIComponent(customerId)}`;
        }

        // 生成表格行HTML
        function createTableRow(customer) {
            const profitClass = customer.todayProfit >= 0 ? 'profit' : 'loss';
            const profitSign = customer.todayProfit >= 0 ? '+' : '';

            return `
                <tr onclick="viewDetail('${customer.customerId}')">
                    <td><div class="customer-name">${customer.customerName}</div></td>
                    <td><a class="customer-id customer-id-link" href="${getDetailPageUrl(customer.customerId)}" onclick="event.stopPropagation();">${customer.customerId}</a></td>
                    <td><span class="tag ${getLevelTagClass(customer.level)}">${customer.level}</span></td>
                    <td><span class="tag ${getRiskTagClass(customer.riskLevel)}">${customer.riskTag}</span></td>
                    <td class="metric-value">${customer.totalAssets.toLocaleString()}</td>
                    <td class="metric-value ${profitClass}" style="color: ${customer.todayProfit >= 0 ? '#e53935' : '#43a047'};">${profitSign}${customer.todayProfit}</td>
                    <td class="metric-value ${profitClass}" style="color: ${customer.todayProfit >= 0 ? '#e53935' : '#43a047'};">${profitSign}${customer.profitRate}%</td>
                    <td>${customer.branch}</td>
                </tr>
            `;
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('customerTableBody');
            const totalPages = Math.max(1, Math.ceil(filteredCustomers.length / rowsPerPage));
            currentPage = Math.min(currentPage, totalPages);
            const start = (currentPage - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, filteredCustomers.length);
            const pageCustomers = filteredCustomers.slice(start, end);

            tbody.innerHTML = pageCustomers.length
                ? pageCustomers.map(customer => createTableRow(customer)).join('')
                : '<tr><td colspan="8" class="loading">当前筛选条件下暂无数据</td></tr>';

            // 更新分页信息
            updatePagination(filteredCustomers.length);
        }

        // 更新分页控件
        function updatePagination(totalRecords) {
            const totalPages = Math.max(1, Math.ceil(totalRecords / rowsPerPage));
            const start = totalRecords === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1;
            const end = Math.min(currentPage * rowsPerPage, totalRecords);

            // 更新显示信息
            document.getElementById('pageInfo').textContent =
                `显示 ${start}-${end} 条，共 ${totalRecords} 条`;

            // 更新页码按钮
            const pageNumbers = document.getElementById('pageNumbers');
            let pageNumbersHtml = '';

            // 计算显示的页码范围
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                pageNumbersHtml += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                if (startPage > 2) {
                    pageNumbersHtml += `<button class="page-btn" disabled>...</button>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const activeClass = i === currentPage ? 'active' : '';
                pageNumbersHtml += `<button class="page-btn ${activeClass}" onclick="goToPage(${i})">${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    pageNumbersHtml += `<button class="page-btn" disabled>...</button>`;
                }
                pageNumbersHtml += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            pageNumbers.innerHTML = pageNumbersHtml;

            // 更新按钮状态
            document.getElementById('firstPageBtn').disabled = currentPage === 1;
            document.getElementById('prevPageBtn').disabled = currentPage === 1;
            document.getElementById('nextPageBtn').disabled = currentPage === totalPages;
            document.getElementById('lastPageBtn').disabled = currentPage === totalPages;
        }

        // 分页函数
        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        function goToFirstPage() {
            goToPage(1);
        }

        function goToPrevPage() {
            if (currentPage > 1) {
                goToPage(currentPage - 1);
            }
        }

        function goToNextPage() {
            const totalPages = Math.max(1, Math.ceil(filteredCustomers.length / rowsPerPage));
            if (currentPage < totalPages) {
                goToPage(currentPage + 1);
            }
        }

        function goToLastPage() {
            const totalPages = Math.max(1, Math.ceil(filteredCustomers.length / rowsPerPage));
            goToPage(totalPages);
        }

        // 加载统计数据
        function formatWanToYi(value) {
            const number = Number(value) || 0;
            return (number / 10000).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        async function loadStatistics() {
            syncFilterState();
            const data = await fetchStatisticsData(selectedBranch, selectedTradeDate);
            if (data) {
                document.getElementById('totalCustomers').textContent = data.totalCustomers;
                document.getElementById('totalAssets').textContent = formatWanToYi(data.totalAssets);
                document.getElementById('todayTrade').textContent = formatWanToYi(data.todayTrade);
                const profitElement = document.getElementById('todayProfit');
                profitElement.textContent = (data.todayProfit >= 0 ? '+' : '') + formatWanToYi(data.todayProfit);
                profitElement.style.color = data.todayProfit >= 0 ? '#e53935' : '#43a047';
            }
        }

        // 加载客户列表
        async function loadCustomerList(page, pageSize, keyword = '') {
            syncFilterState();
            const data = await fetchCustomerList(page, pageSize, keyword, selectedBranch, selectedTradeDate);
            if (data) {
                filteredCustomers = data.list;
                updateDataNote();
                renderTable();
            }
        }

        // 改变每页行数
        async function changeRowsPerPage() {
            rowsPerPage = parseInt(document.getElementById('rowsPerPageSelect').value);
            currentPage = 1; // 重置到第一页
            await loadCustomerList(currentPage, rowsPerPage, document.getElementById('searchInput').value);
        }

        // 搜索客户
        async function searchCustomers() {
            const searchTerm = document.getElementById('searchInput').value;
            currentPage = 1;
            await loadStatistics();
            await loadCustomerList(currentPage, rowsPerPage, searchTerm);
        }

        async function applyFilters() {
            currentPage = 1;
            await loadStatistics();
            await loadCustomerList(currentPage, rowsPerPage, document.getElementById('searchInput').value);
        }

        async function refreshCurrentData() {
            const refreshBtn = document.querySelector('.refresh-btn');
            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.textContent = '刷新中';
            }
            await loadStatistics();
            await loadCustomerList(currentPage, rowsPerPage, document.getElementById('searchInput').value);
            if (refreshBtn) {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '刷新';
            }
        }

        function initFilters() {
            const branchFilter = document.getElementById('branchFilter');
            const tradeDateFilter = document.getElementById('tradeDateFilter');
            if (branchFilter) {
                branchFilter.innerHTML = '<option value="">全部营业部</option>' +
                    BRANCH_OPTIONS.map(branch => `<option value="${branch}">${branch}</option>`).join('');
            }
            if (tradeDateFilter) {
                tradeDateFilter.value = getDefaultTradeDate();
            }
            syncFilterState();
            updateDataNote();
        }

        // 查看详情 - 跳转到详情页面
        function viewDetail(customerId) {
            window.location.href = getDetailPageUrl(customerId);
        }

        // 导出页面为Excel
        async function exportToExcel() {
            try {
                // 获取统计数据
                const statistics = {
                    totalCustomers: document.getElementById('totalCustomers').textContent,
                    totalAssets: document.getElementById('totalAssets').textContent,
                    todayTrade: document.getElementById('todayTrade').textContent,
                    todayProfit: document.getElementById('todayProfit').textContent
                };

                // 获取所有数据（不分页）
                syncFilterState();
                const keyword = document.getElementById('searchInput').value;
                const data = await fetchCustomerList(1, 10000, keyword, selectedBranch, selectedTradeDate);

                if (!data || !data.list || data.list.length === 0) {
                    alert('没有数据可导出');
                    return;
                }

                // 生成HTML格式的Excel内容
                let htmlContent = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <style>
                            * {
                                font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
                                font-size: 11pt;
                            }
                            table {
                                border-collapse: collapse;

                            }
                            th, td {
                                border: 1px solid #4472C4;

                            }
                            .title-row th {
                                font-size: 14pt;
                                background: linear-gradient(135deg, #4472C4 0%, #1F3863 100%);
                                color: white;
                                text-align: center;
                            }
                            .section-header {
                                background: linear-gradient(135deg, #E8EDF7 0%, #D9E2F3 100%);
                                color: #1F3863;

                                text-align: center;
                            }
                            .stat-label {
                                font-weight: bold;
                                color: #1F3863;
                            }
                            tr:nth-child(even) {
                                background: #F2F5FA;
                            }
                        </style>
                    </head>
                    <body>
                        <!-- 标题 -->
                        <table>
                            <tr class="title-row">
                                <th colspan="10">高净值客户管理总览</th>
                            </tr>
                        </table>
                        <br>

                        <!-- 统计数据 -->
                        <table>
                            <tr class="section-header">
                                <th colspan="2">统计概览</th>
                            </tr>
                            <tr>
                                <td class="stat-label">客户总数</td>
                                <td>${statistics.totalCustomers}</td>
                            </tr>
                            <tr>
                                <td class="stat-label">总资产(亿元)</td>
                                <td>${statistics.totalAssets}</td>
                            </tr>
                            <tr>
                                <td class="stat-label">今日交易额(亿元)</td>
                                <td>${statistics.todayTrade}</td>
                            </tr>
                            <tr>
                                <td class="stat-label">今日盈亏(亿元)</td>
                                <td>${statistics.todayProfit}</td>
                            </tr>
                        </table>
                        <br>

                        <!-- 客户列表 -->
                        <table>
                            <tr class="section-header">
                                <th colspan="8">客户列表</th>
                            </tr>
                            <tr>
                                <th>客户姓名</th>
                                <th>客户号</th>
                                <th>客户等级</th>
                                <th>风险等级</th>
                                <th>总资产(万元)</th>
                                <th>今日盈亏(万元)</th>
                                <th>收益率(%)</th>
                                <th>营业部</th>
                            </tr>
                `;

                // 添加客户数据行
                data.list.forEach(customer => {
                    htmlContent += `
                        <tr>
                            <td>${customer.customerName}</td>
                            <td>${customer.customerId}</td>
                            <td>${customer.level}</td>
                            <td>${customer.riskTag}</td>
                            <td>${customer.totalAssets}</td>
                            <td>${customer.todayProfit}</td>
                            <td>${customer.profitRate}%</td>
                            <td>${customer.branch}</td>
                        </tr>
                    `;
                });

                // 添加导出信息
                htmlContent += `
                        </table>
                        <br>
                        <table>
                            <tr class="section-header">
                                <th colspan="2">导出信息</th>
                            </tr>
                            <tr>
                                <td class="stat-label">导出时间</td>
                                <td>${new Date().toLocaleString('zh-CN')}</td>
                            </tr>
                            <tr>
                                <td class="stat-label">数据条数</td>
                                <td>${data.list.length}条</td>
                            </tr>
                        </table>
                    </body>
                    </html>
                `;

                // 创建下载链接
                const blob = new Blob([htmlContent], { type: 'application/vnd.ms-excel;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 10);

                link.setAttribute('href', url);
                link.setAttribute('download', `客户管理总览_${timestamp}.xls`);
                link.style.visibility = 'hidden';

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                console.error('导出失败:', error);
                alert('导出失败，请稍后重试');
            }
        }

        // 监听搜索框回车事件
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCustomers();
            }
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            initFilters();
            loadStatistics();
            loadCustomerList(currentPage, rowsPerPage);
        });
    </script>

    <!-- 导出相关库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        // 导出Excel（包含页面截图和数据表）
        async function exportToExcel() {
            try {
                alert('正在生成导出文件，请稍候...');
                
                // 使用ExcelJS创建工作簿（支持图片）
                const workbook = new ExcelJS.Workbook();

                // 第一个Sheet：页面概览
                try {
                    const container = document.querySelector('.page-wrapper');
                    const canvas = await html2canvas(container, {
                        backgroundColor: '#f5f9ff',
                        scale: 2,
                        logging: false,
                        useCORS: true
                    });

                    // 将canvas转为Blob
                    const imgBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    
                    // 创建第一个Sheet
                    const sheet1 = workbook.addWorksheet('页面概览');
                    
                    // 添加标题
                    sheet1.getCell('A1').value = '页面概览';
                    sheet1.getCell('A1').font = { bold: true, size: 16, color: { argb: 'FF3B82F6' } };
                    sheet1.getCell('A1').alignment = { horizontal: 'center' };
                    
                    // 添加图片
                    const imageId = workbook.addImage({
                        buffer: await imgBlob.arrayBuffer(),
                        extension: 'png',
                    });
                    
                    sheet1.addImage(imageId, {
                        tl: { col: 0, row: 2 },
                        ext: { width: 1200, height: 800 }
                    });
                    
                } catch (error) {
                    console.error('生成页面截图失败:', error);
                }

                // 第二个Sheet：数据结果集
                try {
                    // 获取统计数据
                    const statistics = {
                        totalCustomers: document.getElementById('totalCustomers').textContent,
                        totalAssets: document.getElementById('totalAssets').textContent,
                        todayTrade: document.getElementById('todayTrade').textContent,
                        todayProfit: document.getElementById('todayProfit').textContent
                    };

                    // 获取所有数据
                    syncFilterState();
                    const keyword = document.getElementById('searchInput').value;
                    const data = await fetchCustomerList(1, 10000, keyword, selectedBranch, selectedTradeDate);

                    // 创建第二个Sheet
                    const sheet2 = workbook.addWorksheet('数据结果集');

                    // 添加数据
                    sheet2.addRow(['高净值客户管理总览']);
                    sheet2.addRow([]);
                    sheet2.addRow([]);
                    sheet2.addRow(['=== 统计概览 ===']);
                    sheet2.addRow(['客户总数', statistics.totalCustomers]);
                    sheet2.addRow(['总资产(亿元)', statistics.totalAssets]);
                    sheet2.addRow(['今日交易额(亿元)', statistics.todayTrade]);
                    sheet2.addRow(['今日盈亏(亿元)', statistics.todayProfit]);
                    sheet2.addRow([]);
                    sheet2.addRow([]);
                    sheet2.addRow(['=== 客户列表 ===']);
                    
                    // 表头
                    sheet2.addRow(['客户姓名', '客户号', '客户等级', '风险等级', '总资产(万元)', '今日盈亏(万元)', '收益率(%)', '营业部']);
                    
                    // 数据行
                    if (data && data.list && data.list.length > 0) {
                        data.list.forEach(customer => {
                            sheet2.addRow([
                                customer.customerName,
                                customer.customerId,
                                customer.level,
                                customer.riskTag,
                                customer.totalAssets,
                                customer.todayProfit,
                                customer.profitRate,
                                customer.branch
                            ]);
                        });
                    }

                    // 设置样式
                    sheet2.getCell('A1').font = { bold: true, size: 16, color: { argb: 'FFFFFFFF' } };
                    sheet2.getCell('A1').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF3B82F6' } };
                    sheet2.getCell('A1').alignment = { horizontal: 'center', vertical: 'center' };

                    // 设置列宽
                    sheet2.getColumn(1).width = 15;
                    sheet2.getColumn(2).width = 18;
                    sheet2.getColumn(3).width = 12;
                    sheet2.getColumn(4).width = 12;
                    sheet2.getColumn(5).width = 15;
                    sheet2.getColumn(6).width = 15;
                    sheet2.getColumn(7).width = 12;
                    sheet2.getColumn(8).width = 12;
                    
                } catch (error) {
                    console.error('生成数据表失败:', error);
                }

                // 导出文件
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 10);
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                saveAs(blob, `客户管理总览_${timestamp}.xlsx`);

                alert('导出完成！');

            } catch (error) {
                console.error('导出失败:', error);
                alert('导出失败，请稍后重试');
            }
        }

        // 覆盖原有的exportToExcel函数
        window.exportToExcel = exportToExcel;
    </script>
</body>
