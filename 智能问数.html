    quality:['主键唯一性：`cust_num + trd_date` 不可重复（来自 adp_dws 字段）。','时间完整性：`trd_date` 近7天不能断档，且格式统一。','机构归属完整性：`dept_num` 空值率需低于阈值，避免营业部归属失真。','口径一致性：新增/净增/留存统计口径在日表、月表保持一致。'],

    quality:['关键字段完整性：`cust_num`、`trd_acc_num`、`entr_no`、`entr_date` 不能为空。','金额异常检测：资产/负债/盈亏按环比阈值监控突变。','数据类型一致性：当前元数据大量为 `string`，金额/日期入仓前需校验可解析性。','时效性：交易额与盈亏按 T+0/T+1 约定核对加载时间。'],

  weeklyPortfolio:{

let activeId='';
let typingTimer=null;
const historyList=document.getElementById('historyList');
const homeView=document.getElementById('homeView');
const answerView=document.getElementById('answerView');
const questionText=document.getElementById('questionText');
const questionTime=document.getElementById('questionTime');
const introText=document.getElementById('introText');
const summaryPanel=document.getElementById('summaryPanel');
const insightPanel=document.getElementById('insightPanel');
const questionInput=document.getElementById('questionInput');
function nowStamp(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function matchKey(text){const q=text.replace(/[？?！!。,.，\s]/g,'');if(/未来一周|市场环境|投资方向|组合推荐/.test(q))return 'weeklyPortfolio';if(/投资|组合|股市|债市|基金/.test(q))return 'portfolio';if(/监控|指标|预警|定义/.test(q))return 'warning';if(/流失|流出|下滑/.test(q))return 'outflow';if(/风险/.test(q))return 'risk';if(/两融|融资|融券/.test(q))return 'margin';return 'growth';}
function showHomeState(){homeView.style.display='block';answerView.classList.remove('show');clearInterval(typingTimer);introText.classList.remove('typing');introText.textContent='';summaryPanel.innerHTML='';insightPanel.innerHTML='';}
function showAnswerState(){homeView.style.display='none';answerView.classList.add('show');}
function renderHistory(){historyList.innerHTML=historyItems.map(item=>`<button class="history-card ${activeId===item.id?'active':''}" data-id="${item.id}" type="button"><div class="h-top"><div class="h-q">${item.title}</div><span>⋮</span></div><div class="h-time">${item.time}</div></button>`).join('');historyList.querySelectorAll('.history-card').forEach(btn=>{btn.onclick=()=>{const id=btn.dataset.id;const current=historyItems.find(v=>v.id===id);if(!current)return;activeId=id;renderHistory();runAnswer(current.title,current.key);};});}
function streamText(text,speed=14){clearInterval(typingTimer);introText.textContent='';introText.classList.add('typing');return new Promise(resolve=>{let i=0;typingTimer=setInterval(()=>{i++;introText.textContent=text.slice(0,i);if(i>=text.length){clearInterval(typingTimer);introText.classList.remove('typing');resolve();}},speed);});}
function renderLineSvg(chart,area=false){
  const w=700,h=170,p=24;
  const vals=[...chart.values,...(chart.values2||[])];
  const min=Math.min(...vals),max=Math.max(...vals),range=Math.max(1,max-min);
  const stepX=(w-p*2)/Math.max(1,chart.labels.length-1);
  const pts=chart.values.map((v,i)=>({x:p+i*stepX,y:h-p-((v-min)/range)*(h-p*2)}));
  const d=pts.map((pt,i)=>`${i===0?'M':'L'} ${pt.x} ${pt.y}`).join(' ');
  const dots=pts.map(pt=>`<circle class="line-dot" cx="${pt.x}" cy="${pt.y}" r="3"/>`).join('');
  let second='';
  if(chart.values2){
    const pts2=chart.values2.map((v,i)=>({x:p+i*stepX,y:h-p-((v-min)/range)*(h-p*2)}));
    const d2=pts2.map((pt,i)=>`${i===0?'M':'L'} ${pt.x} ${pt.y}`).join(' ');
    second=`<path d="${d2}" fill="none" stroke="#49b3ff" stroke-width="2" stroke-dasharray="4 4"/>`;
  }
  const areaPath=area?`<path d="${d} L ${pts[pts.length-1].x} ${h-p} L ${pts[0].x} ${h-p} Z" fill="rgba(45,99,246,.15)"/>`:'';
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}">${areaPath}<path d="${d}" fill="none" stroke="#2d63f6" stroke-width="2.5"/>${second}${dots}${chart.labels.map((lb,i)=>`<text x="${p+i*stepX}" y="${h-6}" text-anchor="middle" font-size="11" fill="#7a8598">${lb}</text>`).join('')}</svg>`;
}
function renderBarChart(chart){
  const max=Math.max(...chart.values,1);
  const bars=chart.values.map((v,i)=>{const h=Math.max(14,Math.round((v/max)*100));return `<div class="bar-col"><div class="bar-value">${v}</div><div class="bar" style="height:${h}px"></div><div class="bar-label">${chart.labels[i]}</div></div>`;}).join('');
  return `<div class="bars">${bars}</div>`;
}
function renderHBarChart(chart){
  const max=Math.max(...chart.values,1);
  return `<div class="hbars">${chart.values.map((v,i)=>`<div class="hbar-row"><div class="hbar-name">${chart.labels[i]}</div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(8,Math.round((v/max)*100))}%"></div></div><div class="hbar-value">${v}</div></div>`).join('')}</div>`;
}
function renderDonut(chart){
  const colors = chart.colors && chart.colors.length ? chart.colors : ['#2d63f6','#45b0ff','#7b6dff','#ff8f6b','#6cc26f'];
  const total=chart.values.reduce((a,b)=>a+b,0)||1;
  const cx=72,cy=72,r=52;
  let start=-90;
  const segs=chart.values.map((v,i)=>{const ang=(v/total)*360;const end=start+ang;const a0=(Math.PI/180)*start,a1=(Math.PI/180)*end;const x1=cx+r*Math.cos(a0),y1=cy+r*Math.sin(a0),x2=cx+r*Math.cos(a1),y2=cy+r*Math.sin(a1);const large=ang>180?1:0;const path=`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;start=end;return `<path d="${path}" fill="${colors[i%colors.length]}"></path>`;}).join('');
  const legend=chart.labels.map((lb,i)=>`<div class="donut-item"><span class="dot" style="background:${colors[i%colors.length]}"></span><span>${lb} ${chart.values[i]}</span></div>`).join('');
  return `<div class="donut-wrap"><svg class="chart-svg" viewBox="0 0 144 144" style="width:150px;height:150px;flex:none;border:none">${segs}<circle cx="72" cy="72" r="30" fill="#fff"></circle><text x="72" y="76" text-anchor="middle" font-size="12" fill="#5f6a7e">风险分层</text></svg><div class="donut-legend">${legend}</div></div>`;
}
function renderChartByType(chart){
  if(!chart) return '';
  if(chart.type==='line') return renderLineSvg(chart,false);
  if(chart.type==='area') return renderLineSvg(chart,true);
  if(chart.type==='donut') return renderDonut(chart);
  if(chart.type==='hbar') return renderHBarChart(chart);
  return renderBarChart(chart);
}
function renderInsights(tpl){
  const metricHtml = tpl.metrics.map(item=>`<div class="metric-card"><div class="metric-name">${item[0]}</div><div class="metric-value">${item[1]}</div><div class="metric-trend">${item[2]}</div></div>`).join('');
  const chartHtml = renderChartByType(tpl.chart);
  const menuHtml = tpl.menus.map(m=>`<div class="menu-item">${m}</div>`).join('');
  return `<div class="insight-grid">${metricHtml}</div><div class="chart-box"><div class="chart-title">数据图表</div>${chartHtml}</div><div class="menu-box"><div class="menu-title">菜单建议</div><div class="menu-list">${menuHtml}</div></div>`;
}
function renderOpsGuide(key){
  const g = opsGuideByKey[key] || opsGuideByKey.warning;
  const pathHtml = g.path.map(v=>`<li>${v}</li>`).join('');
  const qualityHtml = g.quality.map(v=>`<li>${v}</li>`).join('');
  const contactHtml = g.contacts.map(v=>`<div class="contact-item"><b>${v[0]}</b><span>${v[1]}</span></div>`).join('');
  return `<div class="ops-box"><div class="ops-title">资产运营平台联动（指标位置 / 质量关注 / 联系人）</div><div class="ops-grid"><div class="ops-col"><h4>到哪里找这些统计指标</h4><ul>${pathHtml}</ul></div><div class="ops-col"><h4>建议重点关注的数据质量</h4><ul>${qualityHtml}</ul></div><div class="ops-col"><h4>联系人</h4><div class="contact-list">${contactHtml}</div></div></div></div>`;
}
async function runAnswer(question,key){const tpl=templates[key]||templates.warning;showAnswerState();questionText.textContent=question;questionTime.textContent=nowStamp();summaryPanel.innerHTML='';insightPanel.innerHTML='';await streamText(`先说结论：${tpl.summary}\n\n我已经基于当前演示数据整理出关键结论和下一步建议。`,12);summaryPanel.innerHTML=`<h3>${question}</h3><ul>${tpl.bullets.map(v=>`<li>${v}</li>`).join('')}</ul>`;insightPanel.innerHTML=renderInsights(tpl)+renderOpsGuide(key);}
function askQuestion(text){const q=(text||questionInput.value).trim();if(!q)return;activeId='';renderHistory();runAnswer(q,matchKey(q));}
renderHistory();
showHomeState();
document.getElementById('sendBtn').onclick=()=>askQuestion();
document.getElementById('newChat').onclick=()=>{questionInput.value='';activeId='';renderHistory();showHomeState();};
questionInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askQuestion();}});
document.querySelector('.guess-row').addEventListener('click',e=>{const btn=e.target.closest('[data-question]');if(btn)askQuestion(btn.dataset.question);});
</script>
</body>
